<script>
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(window.devicePixelRatio);
    document.getElementById('dna-container').appendChild(renderer.domElement);

    const dnaGroup = new THREE.Group();
    
    // Create glowing spheres for the DNA strands
    function createStrand(color, delay) {
        const points = [];
        for (let i = 0; i < 50; i++) {
            const y = (i * 0.4) - 10;
            const angle = (i * 0.3) + delay;
            const x = Math.cos(angle) * 4;
            const z = Math.sin(angle) * 4;
            
            const geo = new THREE.SphereGeometry(0.12, 12, 12);
            const mat = new THREE.MeshPhongMaterial({ 
                color: color, 
                emissive: color, 
                emissiveIntensity: 2,
                shininess: 100 
            });
            const sphere = new THREE.Mesh(geo, mat);
            sphere.position.set(x, y, z);
            dnaGroup.add(sphere);

            // Connectors (Base Pairs)
            if (delay === 0) {
                const x2 = Math.cos(angle + Math.PI) * 4;
                const z2 = Math.sin(angle + Math.PI) * 4;
                const lineGeo = new THREE.BufferGeometry().setFromPoints([
                    new THREE.Vector3(x, y, z),
                    new THREE.Vector3(x2, y, z2)
                ]);
                const lineMat = new THREE.LineBasicMaterial({ color: 0x444444, transparent: true, opacity: 0.3 });
                const line = new THREE.Line(lineGeo, lineMat);
                dnaGroup.add(line);
            }
        }
    }

    createStrand(0x22c55e, 0); // Green strand
    createStrand(0x3b82f6, Math.PI); // Blue strand

    scene.add(dnaGroup);
    
    // Lights for 3D depth
    const light = new THREE.PointLight(0xffffff, 1, 100);
    light.position.set(10, 10, 10);
    scene.add(light);
    const ambient = new THREE.AmbientLight(0x404040);
    scene.add(ambient);

    camera.position.z = 20;
    camera.position.x = 5;

    function animate() {
        requestAnimationFrame(animate);
        dnaGroup.rotation.y += 0.003;
        dnaGroup.rotation.x += 0.001;
        renderer.render(scene, camera);
    }
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
</script>
