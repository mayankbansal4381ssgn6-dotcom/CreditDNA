<script>
// ══════════════════════════════════════════════════════
// DATABASE & CONFIG
// ══════════════════════════════════════════════════════

const KEYS = {
  USERS: 'cdna_users',
  ME:    'cdna_me',
};

const DB = {
  users: () => {
    try { return JSON.parse(localStorage.getItem(KEYS.USERS) || '[]'); }
    catch { return []; }
  },
  save: u => localStorage.setItem(KEYS.USERS, JSON.stringify(u)),
  me: () => {
    try { 
      const me = localStorage.getItem(KEYS.ME);
      return me ? JSON.parse(me) : null;
    }
    catch { return null; }
  },
  setMe: u => {
    try {
      localStorage.setItem(KEYS.ME, JSON.stringify(u));
      const verify = localStorage.getItem(KEYS.ME);
      if (!verify) console.warn('⚠️ localStorage.setMe failed - data not persisted');
    } catch (e) {
      console.error('localStorage error:', e);
    }
  },
  logout: () => localStorage.removeItem(KEYS.ME),
  findByEmail: email => DB.users().find(u => u.email.toLowerCase() === email.toLowerCase()),
  updateUser: patch => {
    const users = DB.users();
    const i = users.findIndex(u => u.id === patch.id);
    if (i > -1) {
      users[i] = { ...users[i], ...patch };
      DB.save(users);
      const me = DB.me();
      if (me && me.id === patch.id) DB.setMe(users[i]);
      return users[i];
    }
    return null;
  },
  deleteUser: id => {
    const users = DB.users().filter(u => u.id !== id);
    DB.save(users);
  },
};

const ADMIN_EMAILS = [
  'simon@creditdna.in',
  'mayank@creditdna.in',
  'varsha@creditdna.in',
  'deva@creditdna.in',
  'admin@creditdna.in',
];

const OCC_LABELS = {
  gig:      'Gig Worker',
  farmer:   'Farmer',
  student:  'Student',
  sme:      'Business Owner',
  daily:    'Daily Wage Worker',
  freelance:'Freelancer',
  salaried: 'Salaried Employee',
  other:    'Other',
};

const scoreColor = s => !s ? '#8c7d6a' : s >= 750 ? '#0f7e5a' : s >= 650 ? '#0d7c52' : s >= 550 ? '#d4500f' : '#c0392b';
const scoreTier = s => !s ? '—' : s >= 750 ? 'Very Good' : s >= 650 ? 'Good' : s >= 550 ? 'Fair' : 'Poor';
const scorePct = s => !s ? 0 : ((s - 300) / 600 * 100);
const fmtAmt = n => n > 0 ? `+₹${n.toLocaleString('en-IN')}` : `−₹${Math.abs(n).toLocaleString('en-IN')}`;
const isAdmin = u => !!(u && ADMIN_EMAILS.includes((u.email || '').toLowerCase()));

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ══════════════════════════════════════════════════════
// TOAST
// ══════════════════════════════════════════════════════

function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  if (!el) return;
  const colors = { ok: '#0f7e5a', err: '#c0392b', info: '#d4500f' };
  const color  = colors[type] || colors.info;
  const item = document.createElement('div');
  item.className = 'toast-item';
  item.innerHTML = `<span class="toast-dot" style="background:${color}"></span>${escapeHTML(msg)}`;
  el.appendChild(item);
  setTimeout(() => {
    item.style.opacity = '0';
    item.style.transition = 'opacity .3s';
    setTimeout(() => item.remove(), 300);
  }, 3000);
}

// ══════════════════════════════════════════════════════
// AUTH
// ══════════════════════════════════════════════════════

function doLogin(email, password) {
  const user = DB.findByEmail(email);
  if (!user || user.password !== password) return null;
  DB.setMe(user);
  const verify = DB.me();
  if (!verify) {
    console.warn('Login: failed to persist user');
    DB.setMe(user);
  }
  return user;
}

function doRegister(data) {
  if (DB.findByEmail(data.email)) {
    toast('This email is already registered', 'err');
    return false;
  }
  const isAdm = ADMIN_EMAILS.includes(data.email.toLowerCase());
  const user = {
    id:      Date.now(),
    name:    data.name,
    email:   data.email.toLowerCase(),
    password:data.password,
    phone:   data.phone || '',
    occ:     data.occ,
    txn:     data.txn,
    upiApp:  data.upiApp,
    isAdmin: isAdm,
    score:   null,
    joined:  new Date().toISOString(),
  };
  const users = DB.users();
  users.push(user);
  DB.save(users);
  DB.setMe(user);
  toast(isAdm ? '👑 Admin account created!' : '🎉 Welcome to CreditDNA!', 'ok');
  return user;
}

function doLogout() {
  DB.logout();
  toast('See you soon!', 'info');
}

// ══════════════════════════════════════════════════════
// PDF + OCR EXTRACTION (FIXED)
// ══════════════════════════════════════════════════════

async function extractPDFTransactions(file) {
  const statusEl = document.getElementById('ocr-status');
  
  function showStatus(type, msg, sub = '') {
    const colors = { loading: '#1d5fa8', ok: '#0f7e5a', error: '#c0392b', warn: '#b45309' };
    const bgs    = { loading: '#e8f0fb', ok: '#e8f5ef', error: '#fdecea', warn: '#fff8e6' };
    const c = colors[type] || colors.loading;
    const bg = bgs[type] || bgs.loading;
    statusEl.style.display = 'block';
    statusEl.innerHTML = `
    <div style="background:${bg};border:1px solid ${c}30;border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:10px;">
      ${type === 'loading' ? `<div style="width:16px;height:16px;border:2px solid ${c};border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;margin-top:2px;"></div>` : ''}
      <div>
        <div style="font-size:13px;font-weight:600;color:${c};">${msg}</div>
        ${sub ? `<div style="font-size:12px;color:${c};opacity:.7;margin-top:2px;">${sub}</div>` : ''}
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>`;
  }

  try {
    showStatus('loading', 'Reading PDF...', 'Converting pages to images');
    const arrayBuffer = await file.arrayBuffer();
    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
    console.log('PDF Pages:', pdf.numPages);

    let fullText = '';

    // PDF → Image → OCR for each page
    for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
      showStatus('loading', `Processing page ${pageNum}/${pdf.numPages}...`, 'Running OCR');
      const page = await pdf.getPage(pageNum);
      const viewport = page.getViewport({ scale: 2 });
      const canvas = document.createElement('canvas');
      const ctx = canvas.getContext('2d');
      canvas.width = viewport.width;
      canvas.height = viewport.height;
      await page.render({ canvasContext: ctx, viewport }).promise;

      // Convert canvas to image for OCR
      const imageData = canvas.toDataURL('image/png');
      console.log(`Page ${pageNum} rendered, running OCR...`);

      // Run Tesseract OCR
      const result = await Tesseract.recognize(imageData, 'eng', {
        logger: m => console.log(`OCR page ${pageNum}:`, m.status, Math.round(m.progress * 100) + '%')
      });

      const pageText = result.data.text;
      console.log(`Page ${pageNum} OCR result (${pageText.length} chars):`, pageText.substring(0, 200));
      fullText += pageText + '\n';
    }

    fullText = fullText.trim();
    console.log('Total extracted text:', fullText.length, 'chars');

    if (fullText.length < 50) {
      showStatus('warn', '⚠️ Could not extract text from PDF', 'Try manual questionnaire below');
      return;
    }

    showStatus('loading', 'Parsing transactions...', 'Almost done');
    const extractedTxns = parseUPITransactions(fullText);
    console.log(`Found ${extractedTxns.length} transactions`);

    if (extractedTxns.length === 0) {
      showStatus('warn', '⚠️ No transactions detected', 'Try the manual questionnaire');
      return;
    }

    showStatus('ok', '✅ Found ' + extractedTxns.length + ' transactions', 'Review and calculate score');
    window._extractedTxns = extractedTxns;
    showTransactionPreview(extractedTxns);
    document.getElementById('calc-section').style.display = 'block';

  } catch (err) {
    console.error('PDF/OCR error:', err);
    showStatus('error', '❌ Could not process PDF', err.message || 'Unknown error');
  }
}

function parseUPITransactions(text) {
  const txns = [];
  const lines = text.split(/\n|\r/).map(l => l.trim()).filter(Boolean);
  console.log(`Parsing ${lines.length} lines...`);

  const datePatterns = [
    /(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})/,
    /(\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2})/,
    /(\d{1,2}\s+(?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec|January|February|March|April|May|June|July|August|September|October|November|December)\s+\d{2,4})/i,
  ];

  const creditWords = /credit|received|refund|cashback|salary|income|deposit|transfer in|topup|add money|income credited|cr\b/i;
  const debitWords = /debit|paid|payment|sent|purchase|transfer out|withdrawal|spent|dr\b/i;

  for (let i = 0; i < lines.length; i++) {
    const line = lines[i];
    if (line.length < 5) continue;

    let dateStr = '';
    for (const pattern of datePatterns) {
      const match = line.match(pattern);
      if (match) {
        dateStr = match[0];
        break;
      }
    }
    if (!dateStr) continue;

    const amounts = [...line.matchAll(/[₹Rs]?\s*([\d,]+(?:\.\d{1,2})?)/g)];
    if (amounts.length === 0) continue;

    const rawAmt = parseFloat(amounts[amounts.length - 1][1].replace(/,/g, ''));
    if (isNaN(rawAmt) || rawAmt < 1 || rawAmt > 10000000) continue;

    const isCredit = creditWords.test(line) && !debitWords.test(line);
    const isDebit = debitWords.test(line) && !creditWords.test(line);
    const credit = isCredit || (!isCredit && !isDebit ? false : isCredit);

    let merchant = line
      .replace(dateStr, '')
      .replace(/[₹Rs]?\s*[\d,]+(?:\.\d{1,2})?/g, '')
      .replace(/\b(?:credit|received|refund|cashback|salary|income|deposit|transfer|topup|add money|credited|debit|paid|payment|sent|purchase|withdrawal|spent|cr|dr)\b/gi, '')
      .replace(/\s+/g, ' ')
      .trim()
      .substring(0, 50);

    if (!merchant || merchant.length < 2) {
      merchant = credit ? 'Income' : 'Payment';
    }

    txns.push({
      date: dateStr,
      merchant: merchant,
      amt: credit ? rawAmt : -rawAmt,
      credit: credit,
    });

    console.log(`  ✓ ${dateStr} | ${merchant.substring(0, 30)} | ₹${rawAmt} | ${credit ? 'CR' : 'DR'}`);
  }

  console.log(`Total parsed: ${txns.length} transactions`);
  return txns.slice(0, 200);
}

      <div style="font-size:11px; font-weight:700; letter-spacing:.1em; color:#8c7d6a; margin-bottom:16px;">YOUR CREDITDNA SCORE</div>
      <div class="font-display font-extrabold" style="font-size:88px; color:${c}; line-height:1;" id="score-num">300</div>
      <div class="badge" style="background:${c}18; color:${c}; margin:12px auto; display:inline-flex; font-size:14px;">${tier}</div>
      <div class="progress-bar" style="margin:20px 0;"><div class="progress-fill" style="width:0%; background:${c};"></div></div>
      <p style="font-size:13px; color:#8c7d6a; margin-bottom:20px;">Based on ${txns.length} real transactions</p>
      <div style="display:flex; gap:12px; justify-content:center; flex-wrap:wrap;">
        <button class="btn-primary" onclick="window._go('dashboard')">View Dashboard →</button>
      </div>
    </div>`;

    let current = 300;
    const el = document.getElementById('score-num');
    const timer = setInterval(() => {
      current = Math.min(score, current + Math.ceil((score - current)/6) + 3);
      if (el) el.innerHTML = current;
      if (current >= score) clearInterval(timer);
    }, 25);
    
    setTimeout(() => {
      const fill = document.querySelector('.progress-fill');
      if (fill) fill.style.width = pct + '%';
    }, 100);

    toast('🎉 Score calculated!', 'ok');
  };
}

// ══════════════════════════════════════════════════════
// MOBILE MENU
// ══════════════════════════════════════════════════════

let mmOpen = false;

function toggleMM() {
  mmOpen = !mmOpen;
  const el = document.getElementById('mobile-menu');
  if (el) el.classList.toggle('open', mmOpen);
}

function closeMM() {
  mmOpen = false;
  const el = document.getElementById('mobile-menu');
  if (el) el.classList.remove('open');
}

window.closeMM = closeMM;
window._toggleMM = toggleMM;

document.addEventListener('click', e => {
  if (mmOpen && !e.target.closest('#mobile-menu') && !e.target.closest('#hb')) closeMM();
});

// ══════════════════════════════════════════════════════
// ROUTER
// ══════════════════════════════════════════════════════

let PAGE = 'landing';

const PAGES = {
  landing: go => renderLanding(go),
  login: go => renderLogin(go),
  register: go => renderRegister(go),
  dashboard: go => renderDashboard(go),
  check: go => renderCheck(go),
};

function go(page) {
  const protected_ = ['dashboard','check'];
  if (protected_.includes(page)) {
    const user = DB.me();
    if (!user) {
      toast('Please sign in first', 'err');
      page = 'login';
    }
  }

  PAGE = page;
  window.scrollTo({ top: 0, behavior: 'smooth' });

  // Render nav
  const logo = document.getElementById('logo-btn');
  if (logo) logo.onclick = () => go('landing');

  const navLinks = document.getElementById('nav-links');
  if (navLinks) {
    const user = DB.me();
    let h = '';
    if (user) {
      h += `<button class="nav-link" onclick="window._go('dashboard')">Dashboard</button>`;
      h += `<button class="nav-link" onclick="window._go('check')">Check Score</button>`;
      h += `<div class="user-avatar">${user.name.charAt(0).toUpperCase()}</div>`;
      h += `<button class="btn-danger btn-sm" onclick="window._logout()">Sign out</button>`;
    } else {
      h += `<button class="nav-link" onclick="window._go('login')">Sign In</button>`;
      h += `<button class="btn-primary btn-sm" onclick="window._go('register')">Get Started</button>`;
    }
    navLinks.innerHTML = h;
  }

  // Render mobile menu
  const mm = document.getElementById('mobile-menu');
  if (mm) {
    const user = DB.me();
    let h = `<button class="mm-item" onclick="window._go('landing'); window.closeMM()">🏠 Home</button>`;
    if (user) {
      h += `<button class="mm-item" onclick="window._go('dashboard'); window.closeMM()">📊 Dashboard</button>`;
      h += `<button class="mm-item" onclick="window._go('check'); window.closeMM()">🎯 Check Score</button>`;
      h += `<div class="mm-div"></div>`;
      h += `<button class="mm-item" style="color:#c0392b" onclick="window._logout(); window.closeMM()">🚪 Sign Out</button>`;
    } else {
      h += `<div class="mm-div"></div>`;
      h += `<button class="mm-item" onclick="window._go('login'); window.closeMM()">🔑 Sign In</button>`;
      h += `<button class="btn-primary btn-full" style="margin-top:8px;" onclick="window._go('register'); window.closeMM()">Get Started</button>`;
    }
    mm.innerHTML = h;
  }

  const render = PAGES[page] || PAGES.landing;
  render(go);
}

window._go = go;
window._logout = () => { doLogout(); go('landing'); };

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  go('landing');
});

</script>
