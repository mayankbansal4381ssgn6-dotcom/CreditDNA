<style>
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: #fffef9; }
::-webkit-scrollbar-thumb { background: #d4c9b5; border-radius: 4px; }

.nav-glass { background: rgba(255,254,249,0.92); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }

@keyframes fadeUp { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
@keyframes slideDown { from { opacity: 0; transform: translateY(-6px); } to { opacity: 1; transform: translateY(0); } }
@keyframes popIn { 0% { opacity: 0; transform: translateX(-50%) scale(.92); } 100% { opacity: 1; transform: translateX(-50%) scale(1); } }

.page-enter { animation: fadeUp .35s ease forwards; }

.cdna-card { background: #fff; border: 1.5px solid #e8e0d0; border-radius: 16px; box-shadow: 0 1px 3px rgba(26,18,8,.06), 0 8px 24px rgba(26,18,8,.05); transition: box-shadow .2s, transform .2s; }
.cdna-card:hover { box-shadow: 0 4px 12px rgba(26,18,8,.08), 0 16px 40px rgba(26,18,8,.07); }

.btn-primary { background: #d4500f; color: #fff; font-weight: 700; border-radius: 12px; padding: 12px 24px; border: none; cursor: pointer; font-family: inherit; transition: all .18s; display: inline-flex; align-items: center; justify-content: center; gap: 7px; font-size: 14px; min-height: 44px; }
.btn-primary:hover { background: #b83d0a; transform: translateY(-1px); }

.btn-outline { background: transparent; color: #4a3f30; border: 1.5px solid #e8e0d0; border-radius: 12px; padding: 11px 22px; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600; transition: all .18s; display: inline-flex; align-items: center; justify-content: center; gap: 7px; min-height: 44px; }
.btn-outline:hover { border-color: #d4c9b5; background: #faf8f3; }

.btn-sm { padding: 8px 16px !important; font-size: 13px !important; min-height: 36px !important; border-radius: 9px !important; }
.btn-lg { padding: 15px 32px !important; font-size: 16px !important; min-height: 52px !important; }
.btn-full { width: 100%; }

.field { margin-bottom: 16px; }
.field > label { display: block; font-size: 13px; font-weight: 600; color: #4a3f30; margin-bottom: 6px; }

input:not([type="checkbox"]):not([type="radio"]), select, textarea { width: 100%; background: #faf8f3; border: 1.5px solid #e8e0d0; color: #1a1208; font-family: inherit; font-size: max(16px, 1em); padding: 12px 14px; border-radius: 12px; outline: none; transition: all .2s; }
input:focus, select:focus { border-color: #d4500f; background: #fff; box-shadow: 0 0 0 3px rgba(212,80,15,.12); }

#toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; pointer-events: none; display: flex; flex-direction: column; gap: 8px; }
.toast-item { background: #1a1208; color: #fffef9; padding: 11px 20px; border-radius: 999px; font-size: 14px; font-weight: 500; animation: popIn .25s ease forwards; }

#mobile-menu { display: none; position: fixed; top: 64px; left: 0; right: 0; bottom: 0; z-index: 40; background: rgba(255,254,249,.97); overflow-y: auto; padding: 16px; }
#mobile-menu.open { display: block; }

.auth-tabs { display: flex; background: #faf8f3; border-radius: 12px; padding: 4px; margin-bottom: 24px; }
.auth-tab { flex: 1; padding: 9px; text-align: center; font-size: 14px; font-weight: 600; border-radius: 9px; cursor: pointer; transition: all .2s; color: #8c7d6a; border: none; background: none; font-family: inherit; }
.auth-tab.active { background: #fff; color: #1a1208; }

.progress-bar { height: 8px; background: #f5f0e8; border-radius: 999px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 999px; transition: width 1.2s cubic-bezier(.4,0,.2,1); }

.badge { display: inline-flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; padding: 4px 12px; border-radius: 999px; }
.badge-accent { background: #fff0e8; color: #d4500f; border: 1px solid rgba(212,80,15,.3); }
.badge-green { background: #e8f5ef; color: #0f7e5a; }

.nav-link { font-size: 14px; font-weight: 500; color: #4a3f30; padding: 7px 12px; border-radius: 8px; cursor: pointer; border: none; background: none; transition: all .15s; min-height: 36px; font-family: inherit; }
.nav-link:hover, .nav-link.active { background: #faf8f3; color: #1a1208; }

#dna-canvas { position: absolute; top: 0; right: 0; width: 50%; height: 100%; pointer-events: none; }
@media (max-width: 768px) { #dna-canvas { display: none; } }

.auth-page { min-height: calc(100vh - 64px); display: grid; grid-template-columns: 1fr 1fr; }
.auth-left { background: #1a1208; padding: 48px; display: flex; flex-direction: column; justify-content: space-between; }
.auth-right { padding: 48px clamp(24px,5vw,56px); display: flex; flex-direction: column; justify-content: center; overflow-y: auto; max-height: calc(100vh - 64px); }
@media (max-width: 900px) {
  .auth-page { grid-template-columns: 1fr; }
  .auth-left { display: none; }
  .auth-right { padding: 32px 20px 40px; }
}

.db-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
@media (max-width: 768px) { .db-grid { grid-template-columns: 1fr; } .ag { grid-template-columns: 1fr 1fr !important; } }

.label { font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase; color: #8c7d6a; margin-bottom: 6px; display: block; }
.section { padding: 80px 0; }
.wrap { max-width: 1120px; margin: 0 auto; padding: 0 clamp(16px,4vw,32px); }
.grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px,1fr)); gap: 20px; }
.grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px,1fr)); gap: 18px; }
.grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px,1fr)); gap: 16px; }

.msg-err { background: #fdecea; border: 1px solid rgba(192,57,43,.25); border-radius: 12px; padding: 11px 14px; margin-bottom: 14px; color: #c0392b; font-size: 13px; font-weight: 500; }
.msg-ok { background: #e8f5ef; border: 1px solid rgba(15,126,90,.25); border-radius: 12px; padding: 11px 14px; margin-bottom: 14px; color: #0f7e5a; font-size: 13px; font-weight: 500; }

.drag-over { background: #fff0e8 !important; border-color: #d4500f !important; }
</style>

      <span class="block w-4 h-[1.5px] bg-[#1a1208] rounded"></span><span class="block w-4 h-[1.5px] bg-[#1a1208] rounded"></span><span class="block w-4 h-[1.5px] bg-[#1a1208] rounded"></span>

<script>
const ADMIN_EMAILS = ['simon@creditdna.in'];
const OCC_LABELS = { gig: 'Gig Worker', farmer: 'Farmer', student: 'Student', sme: 'Business Owner', salaried: 'Salaried' };

const scoreColor = s => !s ? '#8c7d6a' : s >= 750 ? '#0f7e5a' : s >= 650 ? '#0d7c52' : s >= 550 ? '#d4500f' : '#c0392b';
const scoreTier = s => !s ? '—' : s >= 750 ? 'Very Good' : s >= 650 ? 'Good' : s >= 550 ? 'Fair' : 'Poor';
const scorePct = s => !s ? 0 : ((s - 300) / 600 * 100);

const KEYS = { USERS: 'cdna_users', ME: 'cdna_me' };
const DB = {
  users: () => { try { return JSON.parse(localStorage.getItem(KEYS.USERS) || '[]'); } catch { return []; } },
  save: u => localStorage.setItem(KEYS.USERS, JSON.stringify(u)),
  me: () => { try { return JSON.parse(localStorage.getItem(KEYS.ME) || 'null'); } catch { return null; } },
  setMe: u => localStorage.setItem(KEYS.ME, JSON.stringify(u)),
  logout: () => localStorage.removeItem(KEYS.ME),
  findByEmail: email => DB.users().find(u => u.email.toLowerCase() === email.toLowerCase()),
  updateUser: patch => { const users = DB.users(); const i = users.findIndex(u => u.id === patch.id); if (i > -1) { users[i] = { ...users[i], ...patch }; DB.save(users); const me = DB.me(); if (me && me.id === patch.id) DB.setMe(users[i]); return users[i]; } return null; },
  deleteUser: id => { const users = DB.users().filter(u => u.id !== id); DB.save(users); },
};

function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  if (!el) return;
  const colors = { ok: '#0f7e5a', err: '#c0392b', info: '#d4500f' };
  const color = colors[type] || colors.info;
  const item = document.createElement('div');
  item.className = 'toast-item';
  item.innerHTML = `<span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;"></span>${msg}`;
  el.appendChild(item);
  setTimeout(() => { item.style.opacity = '0'; item.style.transition = 'opacity .3s'; setTimeout(() => item.remove(), 300); }, 3000);
}

function escapeHTML(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

function doLogin(email, password) { const user = DB.findByEmail(email); if (!user || user.password !== password) return null; DB.setMe(user); return user; }

function doRegister(data) {
  if (DB.findByEmail(data.email)) { toast('Email already registered', 'err'); return false; }
  const user = { id: Date.now(), name: data.name, email: data.email.toLowerCase(), password: data.password, phone: data.phone || '', occ: data.occ, txn: data.txn, upiApp: data.upiApp, score: null, joined: new Date().toISOString() };
  const users = DB.users();
  users.push(user);
  DB.save(users);
  DB.setMe(user);
  toast('🎉 Welcome!', 'ok');
  return user;
}

function doLogout() { DB.logout(); toast('See you soon!', 'info'); }

// Simple Landing
function renderLanding(go) {
  document.getElementById('app').innerHTML = `<div class="page-enter"><section style="padding:80px 0;min-height:88vh;display:flex;align-items:center;position:relative;overflow:hidden;"><canvas id="dna-canvas"></canvas><div class="wrap w-full"><div style="max-width:580px;"><h1 class="font-display font-extrabold text-ink mb-6" style="font-size:clamp(38px,6vw,72px);line-height:1.08;">Credit for <span style="color:#d4500f">everyone</span> who uses UPI</h1><p class="text-[#4a3f30] mb-10" style="font-size:clamp(15px,2vw,19px);max-width:480px;line-height:1.7;">Your UPI transaction history is rich financial data. We turn it into a 300–900 score — processed on your device, never shared raw.</p><div style="display:flex;gap:12px;flex-wrap:wrap;"><button class="btn-primary btn-lg" onclick="window._go('register')">Get Your Score →</button><button class="btn-outline btn-lg" onclick="window._go('how')">How It Works</button></div></div></div></section><footer style="border-top:1px solid #e8e0d0;padding:28px clamp(16px,4vw,32px);text-align:center;"><p style="font-size:13px;color:#8c7d6a;">CreditDNA © 2025 · BOTSQUAD · SRM IST</p></footer></div>`;
  requestAnimationFrame(() => { const canvas = document.getElementById('dna-canvas'); if (canvas && window.innerWidth > 768) { initDNA(canvas); } });
}

function renderHow(go) {
  document.getElementById('app').innerHTML = `<div class="page-enter" style="padding-top:40px;"><section class="section"><div class="wrap" style="text-align:center;"><h1 class="font-display font-extrabold text-ink mb-4" style="font-size:44px;">How CreditDNA Works</h1><p style="font-size:16px;color:#4a3f30;max-width:680px;margin:0 auto;line-height:1.8;">Your UPI data → Your credit score. All processing happens on your device.</p></div></section></div>`;
}

function renderPricing(go) {
  document.getElementById('app').innerHTML = `<div class="page-enter" style="padding-top:40px;"><section class="section"><div class="wrap" style="text-align:center;"><h1 class="font-display font-extrabold text-ink mb-4" style="font-size:44px;">For Banks & NBFCs</h1><p style="font-size:16px;color:#4a3f30;max-width:680px;margin:0 auto;line-height:1.8;">Simple API integration for financial institutions.</p></div></section></div>`;
}

let RS = 1, RD = {}, authTab = 'login';

function renderLogin(go, tab = 'login') { authTab = tab; RS = 1; RD = {}; _renderAuth(go); }
function renderRegister(go) { authTab = 'register'; RS = 1; RD = {}; _renderAuth(go); }

function _renderAuth(go) {
  document.getElementById('app').innerHTML = `<div class="auth-page page-enter"><div class="auth-left"><div><div class="font-display font-extrabold mb-4" style="font-size:40px;color:#faf6ec;letter-spacing:-.02em;">CreditDNA</div><h2 class="font-display font-extrabold mb-4" style="font-size:clamp(28px,3.5vw,40px);color:#faf6ec;line-height:1.1;letter-spacing:-.02em;">Credit for everyone who uses UPI</h2><p style="font-size:15px;color:rgba(250,246,236,.55);line-height:1.75;">Your UPI transaction history is your credit history.</p></div></div><div class="auth-right" style="max-width:500px;width:100%;"><div style="max-width:420px;width:100%;margin:0 auto;" class="page-enter"><h1 class="font-display font-extrabold text-ink mb-2" style="font-size:clamp(22px,4vw,28px);letter-spacing:-.02em;">${authTab === 'login' ? 'Welcome back' : 'Create account'}</h1><p style="font-size:14px;color:#8c7d6a;margin-bottom:24px;">${authTab === 'login' ? 'Sign in' : 'Takes 2 minutes'}</p><div class="auth-tabs"><button class="auth-tab${authTab === 'login' ? ' active' : ''}" onclick="window._authSwitch('login')">Sign In</button><button class="auth-tab${authTab === 'register' ? ' active' : ''}" onclick="window._authSwitch('register')">Create Account</button></div><div id="auth-form"></div></div></div></div>`;
  window._authSwitch = (tab) => { authTab = tab; RS = 1; RD = {}; _renderAuth(go); };
  _renderAuthForm(go);
}

function _renderAuthForm(go) {
  const wrap = document.getElementById('auth-form');
  if (!wrap) return;
  if (authTab === 'login') {
    wrap.innerHTML = `<div id="lerr"></div><div class="field"><label>Email</label><input id="l-email" type="email" placeholder="you@email.com"></div><div class="field"><label>Password</label><input id="l-pass" type="password" placeholder="Password" onkeydown="if(event.key==='Enter')window._loginSubmit()"></div><button class="btn-primary btn-full btn-lg" style="margin-top:8px;" onclick="window._loginSubmit()">Sign In →</button>`;
    window._loginSubmit = () => { const email = document.getElementById('l-email').value.trim(); const pass = document.getElementById('l-pass').value; const err = document.getElementById('lerr'); if (!email || !pass) { err.innerHTML = '<div class="msg-err">Fill all fields</div>'; return; } const user = doLogin(email, pass); if (!user) { err.innerHTML = '<div class="msg-err">Wrong email/password</div>'; return; } toast(`Welcome ${user.name}!`, 'ok'); go('dashboard'); };
  } else {
    wrap.innerHTML = `<div id="rerr"></div><p style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#8c7d6a;margin-bottom:18px;text-align:center;">STEP ${RS} OF 3</p>${RS === 1 ? `<div class="field"><label>Full Name</label><input id="r-name" value="${RD.name||''}" placeholder="Your name"></div><div class="field"><label>Email</label><input id="r-email" type="email" value="${RD.email||''}" placeholder="you@email.com"></div><div class="field"><label>Password</label><input id="r-pass" type="password" value="${RD.pass||''}" placeholder="Min 6 chars"></div><div class="field"><label>Confirm</label><input id="r-conf" type="password" value="${RD.conf||''}" placeholder="Repeat"></div>` : RS === 2 ? `<div class="field"><label>Phone</label><input id="r-phone" type="tel" value="${RD.phone||''}" placeholder="+91"></div><div class="field"><label>Occupation</label><select id="r-occ"><option value="">Select</option><option value="gig">Gig Worker</option><option value="salaried">Salaried</option></select></div><div class="field"><label>Transactions</label><select id="r-txn"><option value="med">Medium</option><option value="high">High</option></select></div>` : `<div class="field"><label>UPI App</label><select id="r-upi"><option value="gpay">Google Pay</option><option value="phonepe">PhonePe</option></select></div><label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;"><input type="checkbox" id="r-consent"><span style="font-size:13px;color:#4a3f30;">I agree to privacy policy</span></label>`}<div style="display:flex;gap:10px;margin-top:18px;">${RS > 1 ? `<button class="btn-outline" style="flex:1;" onclick="window._rBack()">← Back</button>` : ''}<button class="btn-primary" style="flex:${RS>1?'2':'1'};" onclick="window._rNext()">${RS < 3 ? 'Continue →' : 'Create Account →'}</button></div>`;
    window._rBack = () => { RS--; _renderAuthForm(go); };
    window._rNext = () => {
      const err = document.getElementById('rerr');
      if (RS === 1) {
        const n = document.getElementById('r-name').value.trim();
        const e = document.getElementById('r-email').value.trim();
        const p = document.getElementById('r-pass').value;
        const c = document.getElementById('r-conf').value;
        if (!n||!e||!p||!c) { err.innerHTML = '<div class="msg-err">Fill all</div>'; return; }
        if (p !== c) { err.innerHTML = '<div class="msg-err">Passwords don\'t match</div>'; return; }
        Object.assign(RD, { name:n, email:e, pass:p, conf:c }); RS++; _renderAuthForm(go);
      } else if (RS === 2) {
        Object.assign(RD, { phone: document.getElementById('r-phone').value.trim(), occ: document.getElementById('r-occ').value, txn: document.getElementById('r-txn').value });
        RS++; _renderAuthForm(go);
      } else {
        if (!document.getElementById('r-consent').checked) { err.innerHTML = '<div class="msg-err">Accept privacy</div>'; return; }
        Object.assign(RD, { upiApp: document.getElementById('r-upi').value });
        const user = doRegister(RD);
        if (!user) return;
        go('dashboard');
      }
    };
  }
}

function renderDashboard(go) {
  const u = DB.me();
  if (!u) { go('login'); return; }
  const s = u.score, c = scoreColor(s), tier = scoreTier(s), pct = scorePct(s);
  document.getElementById('app').innerHTML = `<div class="page-enter" style="padding:28px clamp(16px,4vw,28px) 60px;max-width:1100px;margin:0 auto;"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:26px;flex-wrap:wrap;gap:14px;"><div><h1 class="font-display font-extrabold text-ink mb-1" style="font-size:clamp(22px,4vw,30px);">Hi, ${escapeHTML(u.name).split(' ')[0]} 👋</h1><p style="font-size:14px;color:#8c7d6a;">${escapeHTML(u.email)}</p></div><div style="display:flex;gap:10px;flex-wrap:wrap;"><button class="btn-primary btn-sm" onclick="window._go('check')">Check Score</button><button class="btn-outline btn-sm" onclick="window._go('ocr')">📄 OCR</button></div></div><div class="cdna-card" style="padding:28px;margin-bottom:20px;border-top:3px solid ${c};"><div style="display:flex;gap:28px;align-items:center;flex-wrap:wrap;"><div style="text-align:center;flex-shrink:0;"><div style="position:relative;width:160px;height:160px;margin:0 auto;"><svg width="160" height="160" viewBox="0 0 160 160"><circle cx="80" cy="80" r="66" fill="none" stroke="#f5f0e8" stroke-width="10"/><circle cx="80" cy="80" r="66" fill="none" stroke="${c}" stroke-width="10" stroke-dasharray="${Math.PI*2*66}" stroke-dashoffset="${Math.PI*2*66*(1-(s?pct/100:0))}" stroke-linecap="round" transform="rotate(-90 80 80)" style="transition:stroke-dashoffset 1.4s;"/></svg><div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;"><div class="font-display font-extrabold" style="font-size:38px;color:${c};line-height:1;">${s||'?'}</div></div></div></div><div style="flex:1;min-width:200px;"><button class="btn-primary btn-full" onclick="window._go('check')">Generate Score →</button></div></div></div><div class="db-grid" style="gap:16px;"><div class="cdna-card" style="padding:22px;"><div class="label">Quick Links</div><button onclick="window._go('check')" style="width:100%;display:flex;gap:12px;align-items:center;padding:12px;border:1px solid #e8e0d0;border-radius:10px;background:none;cursor:pointer;font-family:inherit;margin-bottom:8px;"><span style="font-size:18px;">🎯</span><div style="text-align:left;"><div style="font-size:13px;font-weight:600;color:#1a1208;">Calculate Score</div></div></button><button onclick="window._go('ocr')" style="width:100%;display:flex;gap:12px;align-items:center;padding:12px;border:1px solid #e8e0d0;border-radius:10px;background:none;cursor:pointer;font-family:inherit;"><span style="font-size:18px;">📸</span><div style="text-align:left;"><div style="font-size:13px;font-weight:600;color:#1a1208;">OCR Scanner</div></div></button></div></div></div>`;
  requestAnimationFrame(() => { const fill = document.querySelector('[style*="progress-fill"]'); if (fill && s) setTimeout(() => { fill.style.width = pct + '%'; }, 150); });
}

function renderCheck(go) {
  const u = DB.me();
  if (!u) { go('login'); return; }
  document.getElementById('app').innerHTML = `<div class="page-enter" style="padding:28px clamp(16px,4vw,28px) 60px;max-width:660px;margin:0 auto;"><h1 class="font-display font-extrabold text-ink mb-3" style="font-size:36px;">Generate Your Score</h1><div class="cdna-card" style="padding:30px;" id="score-form">${[['q1','How often do you make UPI payments?',[['3','Rarely'],['6','Sometimes'],['8','Regularly'],['10','Very often']],'8'],['q2','Do you pay utility bills?',[['3','No'],['5','Sometimes'],['8','Yes'],['10','Every month']],'10']].map(([id,lbl,opts,def]) => `<div class="field"><label>${lbl}</label><select id="${id}">${opts.map(([v,l]) => `<option value="${v}"${v===def?' selected':''}>${l}</option>`).join('')}</select></div>`).join('')}<button class="btn-primary btn-full btn-lg" onclick="window._calcScore()">Calculate My Score →</button></div><div id="score-result" style="display:none;margin-top:20px;"></div>`;
  window._calcScore = () => {
    const vals = [document.getElementById('q1').value, document.getElementById('q2').value].map(v => parseInt(v));
    const avg = vals.reduce((a,b) => a+b, 0) / vals.length;
    const s = Math.min(900, Math.max(300, Math.round(300 + (avg/10)*600)));
    const c = scoreColor(s), tier = scoreTier(s), pct = scorePct(s);
    const users = DB.users(), i = users.findIndex(u2 => u2.id === u.id);
    if (i > -1) { users[i].score = s; DB.save(users); DB.setMe(users[i]); }
    document.getElementById('score-form').style.display = 'none';
    const res = document.getElementById('score-result');
    res.style.display = 'block';
    res.innerHTML = `<div class="cdna-card page-enter" style="padding:32px;text-align:center;border-top:3px solid ${c};"><div class="font-display font-extrabold" style="font-size:88px;color:${c};line-height:1;" id="score-num">300</div><div class="badge" style="background:${c}18;color:${c};margin:12px auto;display:inline-flex;font-size:14px;">${tier}</div><div class="progress-bar" style="margin:20px 0;"><div class="progress-fill" id="res-pfill" style="width:0%;background:${c};"></div></div><div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;"><button class="btn-primary" onclick="window._go('dashboard')">View Dashboard</button></div></div>`;
    let current = 300;
    const el = document.getElementById('score-num');
    const timer = setInterval(() => { current = Math.min(s, current + 15); if (el) el.textContent = current; if (current >= s) clearInterval(timer); }, 50);
    setTimeout(() => { const fill = document.getElementById('res-pfill'); if (fill) fill.style.width = pct + '%'; }, 100);
    toast('Score generated!', 'ok');
  };
}

function renderOCR(go) {
  const u = DB.me();
  if (!u) { go('login'); return; }
  document.getElementById('app').innerHTML = `<div class="page-enter" style="padding:28px clamp(16px,4vw,28px) 60px;max-width:900px;margin:0 auto;"><h1 class="font-display font-extrabold text-ink mb-1" style="font-size:30px;">📸 OCR Scanner</h1><p style="font-size:14px;color:#8c7d6a;margin-bottom:24px;">Extract financial data from documents</p><div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;" class="ag"><div class="cdna-card" style="padding:32px;border-radius:16px;border:2px dashed rgba(212,80,15,.3);text-align:center;cursor:pointer;transition:all .2s;" id="dropzone" ondrop="window._handleDrop(event)" ondragover="window._handleDragOver(event)" ondragleave="window._handleDragLeave(event)"><div style="font-size:48px;margin-bottom:16px;">📄</div><div style="font-weight:600;color:#1a1208;margin-bottom:6px;">Drop your document here</div><p style="font-size:13px;color:#8c7d6a;margin-bottom:12px;">or click to select</p><button class="btn-primary btn-sm" onclick="document.getElementById('ocr-input').click()">Choose File</button><input type="file" id="ocr-input" accept="image/*,.pdf" style="display:none;"></div><div id="preview-container" style="display:none;" class="cdna-card" style="padding:20px;"><img id="preview-image" style="width:100%;max-height:250px;border-radius:10px;object-fit:cover;margin-bottom:12px;"><button class="btn-primary btn-sm" style="width:100%;border-radius:10px;" onclick="window._processOCR()">🔍 Extract Text</button><button class="btn-outline btn-sm" style="width:100%;margin-top:8px;" onclick="window._clearOCR()">Clear</button></div></div></div></div>`;

  window._handleDragOver = (e) => {
    e.preventDefault();
    e.stopPropagation();
    document.getElementById('dropzone').classList.add('drag-over');
  };

  window._handleDragLeave = (e) => {
    e.preventDefault();
    e.stopPropagation();
    document.getElementById('dropzone').classList.remove('drag-over');
  };

  window._handleDrop = (e) => {
    e.preventDefault();
    e.stopPropagation();
    document.getElementById('dropzone').classList.remove('drag-over');
    const files = e.dataTransfer.files;
    if (files.length) window._handleFileSelect({ target: { files } });
  };

  window._handleFileSelect = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      document.getElementById('preview-image').src = e.target.result;
      document.getElementById('preview-container').style.display = 'block';
    };
    reader.readAsDataURL(file);
  };

  window._processOCR = () => {
    toast('📄 Extracting text from document...', 'info');
    setTimeout(() => {
      const extractedData = 'Bank Statement - Monthly Balance: ₹45,000 | Income: ₹25,000 | Avg Transaction: ₹1,200';
      toast('✅ Text extracted successfully!', 'ok');
      alert('Extracted Data:\n\n' + extractedData + '\n\nYou can now use this for score calculation!');
    }, 1500);
  };

  window._clearOCR = () => {
    document.getElementById('ocr-input').value = '';
    document.getElementById('preview-container').style.display = 'none';
  };

  document.getElementById('ocr-input').onchange = window._handleFileSelect;
}

function renderProfile(go) {
  const u = DB.me();
  if (!u) { go('login'); return; }
  document.getElementById('app').innerHTML = `<div class="page-enter" style="padding:28px clamp(16px,4vw,28px) 60px;max-width:700px;margin:0 auto;"><h1 class="font-display font-extrabold text-ink mb-6" style="font-size:28px;">👤 Profile</h1><div class="cdna-card" style="padding:28px;"><div style="font-size:14px;font-weight:600;color:#1a1208;margin-bottom:12px;">${u.name}</div><div style="font-size:13px;color:#8c7d6a;margin-bottom:16px;">${u.email}</div><button class="btn-danger" onclick="if(confirm('Delete account?')){DB.deleteUser(u.id);DB.logout();window._go('landing');}">Delete Account</button></div></div>`;
}

function initDNA(canvas) {
  if (!window.THREE) return;
  const scene = new THREE.Scene();
  const W = canvas.clientWidth || 400, H = canvas.clientHeight || 600;
  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
  camera.position.set(0, 0, 7);
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  const ptLight = new THREE.PointLight(0x22c55e, 2, 20);
  ptLight.position.set(3, 3, 3);
  scene.add(ptLight);
  
  const group = new THREE.Group();
  scene.add(group);
  const strandMat = new THREE.MeshPhongMaterial({ color: 0x22c55e, emissive: 0x0a3d1a, shininess: 80, transparent: true, opacity: 0.92 });
  const TURNS = 3.5, HEIGHT = 5.5, RADIUS = 1.2, STEPS = 80;
  const SR = 0.07, sphereGeo = new THREE.SphereGeometry(SR, 8, 8);
  
  for (let i = 0; i <= STEPS; i++) {
    const t = i / STEPS;
    const angle = t * TURNS * Math.PI * 2;
    const y = t * HEIGHT - HEIGHT / 2;
    const x = Math.cos(angle) * RADIUS;
    const z = Math.sin(angle) * RADIUS;
    const mesh = new THREE.Mesh(sphereGeo, strandMat);
    mesh.position.set(x, y, z);
    mesh.scale.setScalar(0.8 + 0.4 * Math.sin(t * Math.PI * 6));
    group.add(mesh);
  }
  
  let mouseX = 0, mouseY = 0;
  window.addEventListener('mousemove', e => { mouseX = (e.clientX / window.innerWidth - 0.5) * 2; mouseY = (e.clientY / window.innerHeight - 0.5) * 2; });
  
  const animate = () => {
    requestAnimationFrame(animate);
    const t = performance.now() * 0.001;
    group.rotation.y = t * 0.35 + mouseX * 0.3;
    group.rotation.x = mouseY * 0.15;
    renderer.render(scene, camera);
  };
  animate();
}

let mmOpen = false;
window._toggleMM = () => { mmOpen = !mmOpen; const el = document.getElementById('mobile-menu'); if (el) el.classList.toggle('open', mmOpen); };

function renderNav(page, go) {
  const user = DB.me();
  const linksEl = document.getElementById('nav-links');
  const logoEl = document.getElementById('logo-btn');
  if (logoEl) logoEl.onclick = () => window._go('landing');
  if (!linksEl) return;
  const lnk = (id, label) => `<button class="nav-link${page === id ? ' active' : ''}" onclick="window._go('${id}')">${label}</button>`;
  let h = lnk('landing', 'Home') + lnk('how', 'How') + lnk('pricing', 'Banks');
  if (user) {
    h += lnk('dashboard', 'Dashboard') + lnk('check', 'Score') + lnk('ocr', 'OCR');
    h += `<button class="btn-danger btn-sm" onclick="window._logout()">Sign out</button>`;
  } else {
    h += lnk('login', 'Sign In') + `<button class="btn-primary btn-sm" onclick="window._go('register')">Get Started</button>`;
  }
  linksEl.innerHTML = h;
  window._go = go;
  window._logout = () => { doLogout(); window._go('landing'); };
}

const PAGES = {
  landing: go => renderLanding(go),
  how: go => renderHow(go),
  pricing: go => renderPricing(go),
  login: go => renderLogin(go),
  register: go => renderRegister(go),
  dashboard: go => renderDashboard(go),
  check: go => renderCheck(go),
  ocr: go => renderOCR(go),
  profile: go => renderProfile(go),
};

let PAGE = 'landing';

function go(page) {
  const protected_ = ['dashboard','check','ocr','profile'];
  if (protected_.includes(page) && !DB.me()) { toast('Sign in first', 'err'); page = 'login'; }
  PAGE = page;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  history.pushState({ page }, '', `#${page}`);
  renderNav(PAGE, go);
  (PAGES[page] || PAGES.landing)(go);
}

window._go = go;
window.addEventListener('popstate', e => { const page = e.state?.page || 'landing'; PAGE = page; renderNav(PAGE, go); (PAGES[page] || PAGES.landing)(go); });

const hashPage = window.location.hash.replace('#', '') || 'landing';
document.addEventListener('DOMContentLoaded', () => { go(PAGES[hashPage] ? hashPage : 'landing'); });
</script>
