<script>
const ADMIN_EMAILS = ['simon@creditdna.in', 'mayank@creditdna.in'];
const OCC_LABELS = { gig: 'Gig Worker', farmer: 'Farmer', student: 'Student', sme: 'Business Owner', daily: 'Daily Wage Worker', freelance: 'Freelancer', salaried: 'Salaried Employee', other: 'Other' };

const scoreColor = s => !s ? '#8c7d6a' : s >= 750 ? '#0f7e5a' : s >= 650 ? '#0d7c52' : s >= 550 ? '#d4500f' : '#c0392b';
const scoreTier = s => !s ? '—' : s >= 750 ? 'Very Good' : s >= 650 ? 'Good' : s >= 550 ? 'Fair' : 'Poor';
const scorePct = s => !s ? 0 : ((s - 300) / 600 * 100);
const isAdmin = u => !!(u && ADMIN_EMAILS.includes((u.email || '').toLowerCase()));

const KEYS = { USERS: 'cdna_users', ME: 'cdna_me' };
const DB = {
  users: () => { try { return JSON.parse(localStorage.getItem(KEYS.USERS) || '[]'); } catch { return []; } },
  save: u => localStorage.setItem(KEYS.USERS, JSON.stringify(u)),
  me: () => { try { return JSON.parse(localStorage.getItem(KEYS.ME) || 'null'); } catch { return null; } },
  setMe: u => localStorage.setItem(KEYS.ME, JSON.stringify(u)),
  logout: () => localStorage.removeItem(KEYS.ME),
  findByEmail: email => DB.users().find(u => u.email.toLowerCase() === email.toLowerCase()),
  updateUser: patch => { const users = DB.users(); const i = users.findIndex(u => u.id === patch.id); if (i > -1) { users[i] = { ...users[i], ...patch }; DB.save(users); const me = DB.me(); if (me && me.id === patch.id) DB.setMe(users[i]); return users[i]; } return null; },
  deleteUser: id => { const users = DB.users().filter(u => u.id !== id); DB.save(users); },
};

function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  if (!el) return;
  const colors = { ok: '#0f7e5a', err: '#c0392b', info: '#d4500f' };
  const color = colors[type] || colors.info;
  const item = document.createElement('div');
  item.className = 'toast-item';
  item.innerHTML = `<span style="width:7px;height:7px;border-radius:50%;background:${color};flex-shrink:0;"></span>${msg}`;
  el.appendChild(item);
  setTimeout(() => { item.style.opacity = '0'; item.style.transition = 'opacity .3s'; setTimeout(() => item.remove(), 300); }, 3000);
}

function escapeHTML(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }

function doLogin(email, password) {
  const user = DB.findByEmail(email);
  if (!user || user.password !== password) return null;
  DB.setMe(user);
  return user;
}

function doRegister(data) {
  if (DB.findByEmail(data.email)) { toast('This email is already registered', 'err'); return false; }
  const isAdm = ADMIN_EMAILS.includes(data.email.toLowerCase());
  const user = { id: Date.now(), name: data.name, email: data.email.toLowerCase(), password: data.password, phone: data.phone || '', occ: data.occ, txn: data.txn, upiApp: data.upiApp, isAdmin: isAdm, score: null, joined: new Date().toISOString() };
  const users = DB.users();
  users.push(user);
  DB.save(users);
  DB.setMe(user);
  toast(isAdm ? '👑 Admin account created!' : '🎉 Welcome!', 'ok');
  return user;
}

  </div>`;

  window._calcScore = () => {
    const vals = ['q1','q2','q3','q4','q5'].map(id => parseInt(document.getElementById(id).value));
    const avg = vals.reduce((a,b) => a+b, 0) / vals.length;
    const s = Math.min(900, Math.max(300, Math.round(300 + (avg/10)*600)));
    const c = scoreColor(s), tier = scoreTier(s), pct = scorePct(s);

    const users = DB.users(), i = users.findIndex(u2 => u2.id === u.id);
    if (i > -1) { users[i].score = s; DB.save(users); DB.setMe(users[i]); }

    document.getElementById('score-form').style.display = 'none';
    const res = document.getElementById('score-result');
    res.style.display = 'block';
    res.innerHTML = `

      <div class="badge" style="background:${c}18;color:${c};margin:12px auto;display:inline-flex;font-size:14px;">${tier}</div>
      <div class="progress-bar" style="margin:20px 0;"><div class="progress-fill" id="res-pfill" style="width:0%;background:${c};"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#8c7d6a;margin-bottom:24px;"><span>300</span><span>900</span></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;text-align:left;">
        ${[['Payment Regularity',vals[1]*10],['UPI Frequency',vals[0]*10],['Merchant Diversity',vals[2]*10],['Income Consistency',vals[3]*10]]
          .map(([l,v]) => `<div style="background:#faf8f3;border-radius:10px;padding:14px;"><div style="font-size:11px;color:#8c7d6a;margin-bottom:4px;">${l}</div><div class="font-display font-bold" style="font-size:22px;color:${c};">${v}<span style="font-size:13px;color:#8c7d6a;">/100</span></div></div>`).join('')}
      </div>
      <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
        <button class="btn-primary" onclick="window._go('dashboard')">View Dashboard →</button>
        <button class="btn-outline" onclick="window.location.reload()">Recalculate</button>
      </div>
    </div>`;

    let current = 300;
    const el = document.getElementById('score-num');
    const timer = setInterval(() => { current = Math.min(s, current + Math.ceil((s-current)/6) + 3); if (el) el.textContent = current; if (current >= s) clearInterval(timer); }, 25);
    setTimeout(() => { const fill = document.getElementById('res-pfill'); if (fill) fill.style.width = pct + '%'; }, 100);
    toast('Score generated!', 'ok');
  };
}

        <div style="font-weight:600;color:#1a1208;margin-bottom:6px;">Drop document here</div>
        <button class="btn-primary btn-sm" onclick="document.getElementById('ocr-input').click()">Choose File</button>
        <input type="file" id="ocr-input" accept="image/*,.pdf" style="display:none;">
      </div>
      <div id="preview-container" style="display:none;" class="cdna-card" style="padding:20px;">
        <img id="preview-image" style="width:100%;max-height:250px;border-radius:10px;object-fit:cover;margin-bottom:12px;">
        <button id="extract-btn" class="btn-primary btn-sm" style="width:100%;border-radius:10px;" onclick="startOCR()">🔍 Extract Text</button>
      </div>
    </div>
    
    <div id="success-panel" style="display:none;"></div>
  </div>`;

  // File preview + drag-drop (already working)
  const input = document.getElementById('ocr-input');
  input.onchange = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      document.getElementById('preview-image').src = ev.target.result;
      document.getElementById('preview-container').style.display = 'block';
    };
    reader.readAsDataURL(file);
  };

  const dropzone = document.getElementById('dropzone');
  dropzone.ondragover = (e) => { e.preventDefault(); dropzone.style.borderColor = '#d4500f'; };
  dropzone.ondragleave = () => dropzone.style.borderColor = 'rgba(212,80,15,.3)';
  dropzone.ondrop = (e) => {
    e.preventDefault();
    const file = e.dataTransfer.files[0];
    if (file) {
      const reader = new FileReader();
      reader.onload = (ev) => {
        document.getElementById('preview-image').src = ev.target.result;
        document.getElementById('preview-container').style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  };
}

function initDNA(canvas) {
  if (!window.THREE) return;
  const scene = new THREE.Scene();
  const W = canvas.clientWidth || 400, H = canvas.clientHeight || 600;
  const camera = new THREE.PerspectiveCamera(45, W/H, 0.1, 100);
  camera.position.set(0, 0, 7);
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(W, H);
  renderer.setClearColor(0x000000, 0);
  scene.add(new THREE.AmbientLight(0xffffff, 0.4));
  
  const ptLight1 = new THREE.PointLight(0x22c55e, 2, 20);
  ptLight1.position.set(3, 3, 3);
  scene.add(ptLight1);
  
  const ptLight2 = new THREE.PointLight(0x16a34a, 1.5, 20);
  ptLight2.position.set(-3, -3, 2);
  scene.add(ptLight2);
  
  const ptLight3 = new THREE.PointLight(0xd4500f, 0.8, 15);
  ptLight3.position.set(0, 0, 5);
  scene.add(ptLight3);
  
  const group = new THREE.Group();
  scene.add(group);
  
  const strandMat = new THREE.MeshPhongMaterial({ color: 0x22c55e, emissive: 0x0a3d1a, shininess: 80, transparent: true, opacity: 0.92 });
  const strandMat2 = new THREE.MeshPhongMaterial({ color: 0x16a34a, emissive: 0x061f0d, shininess: 80, transparent: true, opacity: 0.85 });
  const pairMat = new THREE.MeshPhongMaterial({ color: 0x4ade80, emissive: 0x052e16, transparent: true, opacity: 0.6 });
  const accentMat = new THREE.MeshPhongMaterial({ color: 0xd4500f, emissive: 0x3d1503, transparent: true, opacity: 0.7 });
  
  const TURNS = 3.5, HEIGHT = 5.5, RADIUS = 1.2, STEPS = 80, PAIRS = 14;
  const SR = 0.07, sphereGeo = new THREE.SphereGeometry(SR, 8, 8);
  
  for (let s = 0; s < 2; s++) {
    const phaseOffset = s === 0 ? 0 : Math.PI;
    const mat = s === 0 ? strandMat : strandMat2;
    for (let i = 0; i <= STEPS; i++) {
      const t = i / STEPS;
      const angle = t * TURNS * Math.PI * 2 + phaseOffset;
      const y = t * HEIGHT - HEIGHT / 2;
      const x = Math.cos(angle) * RADIUS;
      const z = Math.sin(angle) * RADIUS;
      const mesh = new THREE.Mesh(sphereGeo, mat);
      mesh.position.set(x, y, z);
      const scale = 0.8 + 0.4 * Math.sin(t * Math.PI * 6);
      mesh.scale.setScalar(scale);
      group.add(mesh);
    }
  }
  
  const pairGeo = new THREE.CylinderGeometry(0.04, 0.04, RADIUS * 2, 6);
  for (let p = 0; p < PAIRS; p++) {
    const t = p / (PAIRS - 1);
    const angle = t * TURNS * Math.PI * 2;
    const y = t * HEIGHT - HEIGHT / 2;
    const x1 = Math.cos(angle) * RADIUS;
    const z1 = Math.sin(angle) * RADIUS;
    const x2 = Math.cos(angle + Math.PI) * RADIUS;
    const z2 = Math.sin(angle + Math.PI) * RADIUS;
    const midX = (x1 + x2) / 2;
    const midZ = (z1 + z2) / 2;
    const mat = p % 3 === 0 ? accentMat : pairMat;
    const pair = new THREE.Mesh(pairGeo, mat);
    pair.position.set(midX, y, midZ);
    pair.rotation.z = Math.PI / 2;
    pair.rotation.y = angle;
    group.add(pair);
  }
  
  const particleCount = 120;
  const positions = new Float32Array(particleCount * 3);
  for (let i = 0; i < particleCount; i++) {
    positions[i * 3] = (Math.random() - 0.5) * 5;
    positions[i * 3 + 1] = (Math.random() - 0.5) * 7;
    positions[i * 3 + 2] = (Math.random() - 0.5) * 3;
  }
  const pGeo = new THREE.BufferGeometry();
  pGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const pMat = new THREE.PointsMaterial({ color: 0x22c55e, size: 0.04, transparent: true, opacity: 0.5 });
  scene.add(new THREE.Points(pGeo, pMat));
  
  let mouseX = 0, mouseY = 0;
  window.addEventListener('mousemove', e => {
    mouseX = (e.clientX / window.innerWidth - 0.5) * 2;
    mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
  });
  
  const animate = () => {
    requestAnimationFrame(animate);
    const t = performance.now() * 0.001;
    group.rotation.y = t * 0.35 + mouseX * 0.3;
    group.rotation.x = mouseY * 0.15;
    group.position.y = Math.sin(t * 0.4) * 0.08;
    ptLight1.intensity = 2 + Math.sin(t * 1.5) * 0.5;
    renderer.render(scene, camera);
  };
  animate();
}

let mmOpen = false;
window._toggleMM = () => { mmOpen = !mmOpen; const el = document.getElementById('mobile-menu'); if (el) el.classList.toggle('open', mmOpen); };

function renderNav(page, go) {
  const user = DB.me();
  const linksEl = document.getElementById('nav-links');
  const logoEl = document.getElementById('logo-btn');
  if (logoEl) logoEl.onclick = () => window._go('landing');
  if (!linksEl) return;

  const lnk = (id, label) => `<button class="nav-link${page === id ? ' active' : ''}" onclick="window._go('${id}')">${label}</button>`;
  let h = lnk('landing', 'Home') + lnk('how', 'How It Works') + lnk('pricing', 'For Banks');
  if (user) {
    h += lnk('dashboard', 'Dashboard') + lnk('check', 'My Score') + lnk('ocr', 'OCR');
    h += `<button class="btn-danger btn-sm" onclick="window._logout()">Sign out</button>`;
  } else {
    h += lnk('login', 'Sign In');
    h += `<button class="btn-primary btn-sm" onclick="window._go('register')">Get Started</button>`;
  }
  linksEl.innerHTML = h;
  window._go = go;
  window._logout = () => { doLogout(); window._go('landing'); };
}

const PAGES = {
  landing: go => renderLanding(go),
  how: go => renderHow(go),
  pricing: go => renderPricing(go),
  login: go => renderLogin(go),
  register: go => renderRegister(go),
  dashboard: go => renderDashboard(go),
  check: go => renderCheck(go),
  ocr: go => renderOCR(go),
  transactions: go => renderTransactions(go),
  profile: go => renderProfile(go),
};

let PAGE = 'landing';

function go(page) {
  const protected_ = ['dashboard','check','ocr','transactions','profile'];
  if (protected_.includes(page) && !DB.me()) { toast('Sign in first', 'err'); page = 'login'; }
  PAGE = page;
  window.scrollTo({ top: 0, behavior: 'smooth' });
  history.pushState({ page }, '', `#${page}`);
  renderNav(PAGE, go);
  (PAGES[page] || PAGES.landing)(go);
}

window._go = go;
window.addEventListener('popstate', e => { const page = e.state?.page || 'landing'; PAGE = page; renderNav(PAGE, go); (PAGES[page] || PAGES.landing)(go); });

const hashPage = window.location.hash.replace('#', '') || 'landing';
document.addEventListener('DOMContentLoaded', () => { go(PAGES[hashPage] ? hashPage : 'landing'); });
</script>
