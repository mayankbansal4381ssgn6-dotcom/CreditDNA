<script>
const ADMIN_EMAILS = ['simon@creditdna.in', 'admin@creditdna.in'];
const ADMIN_KEY = 'CDNA2025';

const OCC_LABELS = {
  gig: 'Gig Worker', farmer: 'Farmer', student: 'Student', sme: 'Business Owner',
  daily: 'Daily Wage Worker', freelance: 'Freelancer', salaried: 'Salaried Employee', other: 'Other',
};

const scoreColor = s => !s ? '#8c7d6a' : s >= 750 ? '#0f7e5a' : s >= 650 ? '#0d7c52' : s >= 550 ? '#d4500f' : '#c0392b';
const scoreTier = s => !s ? '—' : s >= 750 ? 'Very Good' : s >= 650 ? 'Good' : s >= 550 ? 'Fair' : 'Poor';
const scorePct = s => !s ? 0 : ((s - 300) / 600 * 100);
const fmtAmt = n => n > 0 ? `+₹${n.toLocaleString('en-IN')}` : `−₹${Math.abs(n).toLocaleString('en-IN')}`;
const isAdmin = u => !!(u && ADMIN_EMAILS.includes((u.email || '').toLowerCase()));
const escapeHTML = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

const KEYS = { USERS: 'cdna_users', ME: 'cdna_me' };
const DB = {
  users: () => { try { return JSON.parse(localStorage.getItem(KEYS.USERS) || '[]'); } catch { return []; } },
  save: u => localStorage.setItem(KEYS.USERS, JSON.stringify(u)),
  me: () => { try { return JSON.parse(localStorage.getItem(KEYS.ME) || 'null'); } catch { return null; } },
  setMe: u => localStorage.setItem(KEYS.ME, JSON.stringify(u)),
  logout: () => localStorage.removeItem(KEYS.ME),
  findByEmail: email => DB.users().find(u => u.email.toLowerCase() === email.toLowerCase()),
  updateUser: patch => {
    const users = DB.users();
    const i = users.findIndex(u => u.id === patch.id);
    if (i > -1) {
      users[i] = { ...users[i], ...patch };
      DB.save(users);
      const me = DB.me();
      if (me && me.id === patch.id) DB.setMe(users[i]);
      return users[i];
    }
    return null;
  },
};

function toast(msg, type = 'info') {
  const el = document.getElementById('toast');
  if (!el) return;
  const colors = { ok: '#0f7e5a', err: '#c0392b', info: '#d4500f' };
  const color  = colors[type] || colors.info;
  const item = document.createElement('div');
  item.className = 'toast-item';
  item.innerHTML = `<span class="toast-dot" style="background:${color}"></span>${msg}`;
  el.appendChild(item);
  setTimeout(() => {
    item.style.opacity = '0';
    item.style.transition = 'opacity .3s';
    setTimeout(() => item.remove(), 300);
  }, 3000);
}

function doLogin(email, password) {
  const user = DB.findByEmail(email);
  if (!user || user.password !== password) return null;
  DB.setMe(user);
  return user;
}

function doRegister(data) {
  if (DB.findByEmail(data.email)) {
    toast('This email is already registered', 'err');
    return false;
  }
  const isAdm = ADMIN_EMAILS.includes(data.email.toLowerCase());
  const user = {
    id: Date.now(),
    name: data.name,
    email: data.email.toLowerCase(),
    password: data.password,
    phone: data.phone || '',
    occ: data.occ,
    txn: data.txn,
    upiApp: data.upiApp,
    isAdmin: isAdm,
    score: null,
    joined: new Date().toISOString(),
    transactions: [],
  };
  const users = DB.users();
  users.push(user);
  DB.save(users);
  DB.setMe(user);
  toast(isAdm ? '👑 Admin account created!' : '🎉 Welcome to CreditDNA!', 'ok');
  return user;
}

function doLogout() {
  DB.logout();
  toast('See you soon!', 'info');
}

window._toggleMM = () => {
  const mm = document.getElementById('mobile-menu');
  mm.classList.toggle('open');
};

window._go = (page) => {
  const u = DB.me();
  document.getElementById('mobile-menu').classList.remove('open');
  
  if (page === 'landing') renderLanding(window._go);
  else if (page === 'login') renderLogin(window._go);
  else if (page === 'register') renderRegister(window._go);
  else if (page === 'dashboard') {
    if (!u) { window._go('login'); return; }
    renderDashboard(window._go);
  }
  else if (page === 'check') {
    if (!u) { window._go('login'); return; }
    renderCheck(window._go);
  }
  else if (page === 'logout') {
    doLogout();
    window._go('landing');
  }
};

// Initialize
window._go('landing');

function renderLanding(go) {
  document.getElementById('app').innerHTML = `
  <div class="page-enter" style="padding:60px clamp(16px,4vw,32px)">
    <div class="wrap">
      <div style="text-align:center;margin-bottom:40px;">
        <h1 class="font-display font-extrabold text-ink" style="font-size:clamp(32px,6vw,56px);line-height:1.1;margin-bottom:16px;">
          Credit for everyone who uses <span style="color:#d4500f;">UPI</span>
        </h1>
        <p style="font-size:16px;color:#4a3f30;margin-bottom:28px;max-width:600px;margin-left:auto;margin-right:auto;">
          Your UPI transaction history is rich financial data. CreditDNA turns it into a 300–900 credit score
          — processed entirely on your device, never shared raw.
        </p>
        <div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap;">
          <button class="btn-primary btn-lg" onclick="window._go('register')">Get Your Score Free →</button>
          <button class="btn-outline btn-lg" onclick="window._go('login')">Sign In</button>
        </div>
      </div>

      <div class="grid-3" style="margin:60px 0;">
        ${[['🔒','Privacy First','Raw data never leaves your device'],
           ['⚡','Instant Results','Score generated in 200ms'],
           ['🧬','50+ Signals','More accurate than CIBIL']].map(([i,t,d]) => `
        <div class="cdna-card" style="padding:28px;text-align:center;">
          <div style="font-size:40px;margin-bottom:12px;">${i}</div>
          <div class="font-display font-bold text-ink mb-2" style="font-size:18px;">${t}</div>
          <div style="font-size:14px;color:#8c7d6a;">${d}</div>
        </div>`).join('')}
      </div>
    </div>
  </div>`;
}

let authTab = 'login';
let RS = 1;
let RD = {};

function renderLogin(go, tab = 'login') {
  authTab = tab; RS = 1; RD = {};
  _renderAuth(go);
}

function renderRegister(go) {
  authTab = 'register'; RS = 1; RD = {};
  _renderAuth(go);
}

function _renderAuth(go) {
  document.getElementById('app').innerHTML = `
  <div class="page-enter" style="padding:40px clamp(16px,4vw,32px);max-width:500px;margin:0 auto;">
    <div style="margin-bottom:32px;">
      <h1 class="font-display font-extrabold text-ink mb-2" style="font-size:clamp(24px,4vw,32px);">
        ${authTab === 'login' ? 'Welcome back 👋' : 'Create your account'}
      </h1>
      <p style="font-size:14px;color:#8c7d6a;margin-bottom:24px;">
        ${authTab === 'login' ? 'Sign in to your CreditDNA account' : 'Free for individuals · Takes 2 minutes'}
      </p>

      <div class="auth-tabs">
        <button class="auth-tab${authTab === 'login' ? ' active' : ''}" onclick="window._authSwitch('login')">Sign In</button>
        <button class="auth-tab${authTab === 'register' ? ' active' : ''}" onclick="window._authSwitch('register')">Create Account</button>
      </div>

      <div id="auth-form"></div>

      <p style="text-align:center;margin-top:18px;font-size:13px;color:#8c7d6a;">
        ${authTab === 'login'
          ? `Don't have an account? <span style="color:#d4500f;cursor:pointer;font-weight:600" onclick="window._authSwitch('register')">Sign up free</span>`
          : `Already registered? <span style="color:#d4500f;cursor:pointer;font-weight:600" onclick="window._authSwitch('login')">Sign in</span>`}
      </p>
    </div>
  </div>`;

  window._authSwitch = (tab) => { authTab = tab; RS = 1; RD = {}; _renderAuth(go); };
  window._authGo = go;
  _renderAuthForm(go);
}

function _renderAuthForm(go) {
  const wrap = document.getElementById('auth-form');
  if (!wrap) return;
  if (authTab === 'login') _renderLoginForm(wrap, go);
  else _renderRegisterStep(wrap, go);
}

function _renderLoginForm(wrap, go) {
  wrap.innerHTML = `
    <div id="lerr"></div>
    <div class="field"><label>Email Address</label>
      <input id="l-email" type="email" placeholder="you@email.com" autocomplete="email">
    </div>
    <div class="field"><label>Password</label>
      <input id="l-pass" type="password" placeholder="Your password" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')window._loginSubmit()">
    </div>
    <button class="btn-primary btn-full btn-lg" style="margin-top:8px;border-radius:12px;" onclick="window._loginSubmit()">Sign In →</button>`;

  window._loginSubmit = () => {
    const email = document.getElementById('l-email').value.trim();
    const pass  = document.getElementById('l-pass').value;
    const err   = document.getElementById('lerr');
    if (!email || !pass) { err.innerHTML = '<div class="msg-err">Please fill in all fields</div>'; return; }
    const user = doLogin(email, pass);
    if (!user) { err.innerHTML = '<div class="msg-err">Incorrect email or password</div>'; return; }
    toast(`Welcome back, ${user.name.split(' ')[0]}! 👋`, 'ok');
    setTimeout(() => go('dashboard'), 1000);
  };
}

  if (RS === 1) fields = `
    <div class="field"><label>Full Name *</label>

    <div class="field"><label>Email Address *</label>

    </div>

    </div>
    <div class="field"><label>Confirm Password *</label>
      <input id="r-conf" type="password" value="${RD.conf||''}" placeholder="Repeat password" autocomplete="new-password">
    </div>`;

  else if (RS === 2) fields = `
    <div class="field"><label>Phone Number</label>

  else fields = `

      <select id="r-upi">
        ${[['gpay','Google Pay'],['phonepe','PhonePe'],['paytm','Paytm'],['bhim','BHIM UPI'],['other','Other']]
          .map(([v,l]) => `<option value="${v}">${l}</option>`).join('')}

    </div>
    <div style="background:#fff0e8;border:1.5px solid rgba(212,80,15,.3);border-radius:12px;padding:16px;margin-bottom:16px;">
      <div style="font-size:12px;font-weight:700;letter-spacing:.08em;color:#d4500f;margin-bottom:10px;">OUR PRIVACY COMMITMENT</div>
      <div style="font-size:13px;color:#4a3f30;line-height:1.8;">
        ✅ Raw UPI data <strong>never uploaded</strong><br>
        ✅ All scoring runs <strong>on your device</strong><br>
        ✅ Banks receive <strong>score only</strong> — not transactions<br>
        ✅ Delete your account anytime
      </div>
    </div>
    <label style="display:flex;align-items:flex-start;gap:10px;cursor:pointer;">
      <input type="checkbox" id="r-consent" style="margin-top:3px;">

  wrap.innerHTML = `
    <p style="font-size:11px;font-weight:700;letter-spacing:.1em;color:#8c7d6a;margin-bottom:18px;">STEP ${RS} OF 3</p>
    <div id="rerr"></div>${fields}
    <div style="display:flex;gap:10px;margin-top:18px;">
      ${RS > 1 ? `<button class="btn-outline" style="flex:1;" onclick="window._rBack()">← Back</button>` : ''}

        ${RS < 3 ? 'Continue →' : 'Create Account →'}

  window._rBack = () => { RS--; _renderRegisterStep(document.getElementById('auth-form'), go); };
  window._rNext = () => _validateStep(wrap, go);
}

function _validateStep(wrap, go) {
  const err = document.getElementById('rerr');

  if (RS === 1) {
    const n = document.getElementById('r-name').value.trim();
    const e = document.getElementById('r-email').value.trim();
    const p = document.getElementById('r-pass').value;
    const c = document.getElementById('r-conf').value;
    if (!n||!e||!p||!c) { err.innerHTML = '<div class="msg-err">Please fill in all fields</div>'; return; }
    if (p.length < 6) { err.innerHTML = '<div class="msg-err">Password must be at least 6 characters</div>'; return; }
    if (p !== c) { err.innerHTML = '<div class="msg-err">Passwords don\'t match</div>'; return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e)) { err.innerHTML = '<div class="msg-err">Please enter a valid email</div>'; return; }
    Object.assign(RD, { name:n, email:e, pass:p, conf:c }); RS++; _renderRegisterStep(wrap, go);

  } else if (RS === 2) {
    const o = document.getElementById('r-occ').value;
    if (!o) { err.innerHTML = '<div class="msg-err">Please select your occupation</div>'; return; }
    Object.assign(RD, { phone: document.getElementById('r-phone').value.trim(), occ:o });
    RS++; _renderRegisterStep(wrap, go);

  } else {
    if (!document.getElementById('r-consent').checked) {
      err.innerHTML = '<div class="msg-err">Please accept the privacy policy to continue</div>'; return;
    }
    Object.assign(RD, { upiApp: document.getElementById('r-upi').value, password: RD.pass });
    const user = doRegister(RD);
    if (!user) return;
    setTimeout(() => go('dashboard'), 1000);
  }
}

function renderCheck(go) {
  const u = DB.me();
  if (!u) { go('login'); return; }

  document.getElementById('app').innerHTML = `
  <div class="page-enter" style="padding:28px clamp(16px,4vw,28px) 60px; max-width:720px; margin:0 auto;">
    <div style="text-align:center;margin-bottom:32px;">
      <span class="label">Score Check</span>

      <p style="font-size:15px;color:#4a3f30;line-height:1.7;max-width:520px;margin:0 auto;">

      </p>
    </div>

    <div style="display:flex;align-items:flex-start;gap:12px;background:#e8f5ef;border:1px solid rgba(15,126,90,.3);border-radius:14px;padding:16px;margin-bottom:28px;">
      <span style="font-size:22px;flex-shrink:0;">🔒</span>
      <div>
        <div style="font-size:13px;font-weight:700;color:#0f7e5a;margin-bottom:4px;">100% On-Device Processing</div>

      </div>
    </div>

    <div class="cdna-card" style="padding:0;border-radius:20px;overflow:hidden;margin-bottom:20px;">

        <div style="font-size:12px;color:#8c7d6a;">Supported: GPay · PhonePe · Paytm · BHIM · Any UPI bank</div>
      </div>
      <div style="padding:24px;">
        <div id="drop-zone" onclick="document.getElementById('pdf-input').click()"
          style="border:2px dashed #e8e0d0;border-radius:14px;padding:40px 24px;text-align:center;cursor:pointer;transition:all .2s;background:#fffef9;"
          ondragover="event.preventDefault();this.style.borderColor='#d4500f';this.style.background='#fff0e8';"
          ondragleave="this.style.borderColor='#e8e0d0';this.style.background='#fffef9';"
          ondrop="event.preventDefault();this.style.borderColor='#e8e0d0';this.style.background='#fffef9';window._handlePDFDrop(event);">
          <div style="font-size:40px;margin-bottom:12px;">📄</div>
          <div class="font-display font-bold text-ink" style="font-size:16px;margin-bottom:6px;">Drop your PDF here or click to browse</div>
          <div style="font-size:13px;color:#8c7d6a;">Max 10MB · PDF files only</div>
        </div>
        <input type="file" id="pdf-input" accept=".pdf,application/pdf" style="display:none;" onchange="window._handlePDFFile(this.files[0])">
        <div id="file-info" style="display:none;margin-top:16px;background:#faf8f3;border-radius:10px;padding:14px;display:none;align-items:center;gap:12px;">
          <span style="font-size:24px;">📋</span>
          <div style="flex:1;min-width:0;">
            <div id="file-name" style="font-size:14px;font-weight:600;color:#1a1208;"></div>
            <div id="file-size" style="font-size:12px;color:#8c7d6a;"></div>
          </div>
          <button onclick="window._clearPDF()" style="font-size:18px;background:none;border:none;cursor:pointer;color:#8c7d6a;padding:4px;">✕</button>
        </div>
      </div>
    </div>

    <div id="ocr-status" style="display:none;margin-bottom:20px;"></div>
    <div id="txn-preview" style="display:none;margin-bottom:20px;"></div>
    <div id="calc-section" style="display:none;margin-bottom:20px;">
      <button class="btn-primary btn-full btn-lg" style="border-radius:14px;" onclick="window._runScoring()">
        Calculate My Score →
      </button>
    </div>

    <div style="margin-top:32px;padding-top:24px;border-top:1px solid #e8e0d0;text-align:center;">
      <div style="font-size:13px;color:#8c7d6a;margin-bottom:8px;">Don't have a PDF handy?</div>
      <button class="btn-ghost btn-sm" onclick="window._showManualQuestionnaire()" style="color:#d4500f;font-size:13px;">
        Use manual questionnaire instead →
      </button>
    </div>

    <div id="manual-section" style="display:none;margin-top:20px;"></div>
  </div>`;

  let selectedFile = null;
  let extractedTxns = [];

  window._handlePDFDrop = (e) => {
    const file = e.dataTransfer.files[0];
    if (file) window._handlePDFFile(file);
  };

  window._clearPDF = () => {
    selectedFile = null;
    extractedTxns = [];
    document.getElementById('file-info').style.display = 'none';
    document.getElementById('drop-zone').style.display = 'block';
    document.getElementById('txn-preview').style.display = 'none';
    document.getElementById('calc-section').style.display = 'none';
    document.getElementById('pdf-input').value = '';
  };

  window._handlePDFFile = async (file) => {
    if (!file) return;
    if (file.type !== 'application/pdf' && !file.name.endsWith('.pdf')) {
      showStatus('error', '❌ Please upload a PDF file only');
      return;
    }
    if (file.size > 10 * 1024 * 1024) {
      showStatus('error', '❌ File too large — max 10MB');
      return;
    }

    selectedFile = file;
    const fi = document.getElementById('file-info');
    fi.style.display = 'flex';
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('file-name').textContent = file.name;
    document.getElementById('file-size').textContent = (file.size / 1024).toFixed(1) + ' KB';

    showStatus('loading', 'Reading PDF...', 'Extracting text from your statement');

    try {
      const pdfDoc = await pdfjs.getDocument(URL.createObjectURL(file)).promise;
      let fullText = '';
      
      for (let i = 0; i < pdfDoc.numPages; i++) {
        const page = await pdfDoc.getPage(i + 1);
        const textContent = await page.getTextContent();
        fullText += textContent.items.map(item => item.str).join(' ') + ' ';
      }

      console.log('PDF Text:', fullText.substring(0, 300));

      extractedTxns = parseUPITransactions(fullText);
      console.log('Extracted:', extractedTxns.length, 'transactions');

      if (extractedTxns.length === 0) {
        showStatus('warn', '⚠️ Could not detect transactions in this PDF', 'Try the manual questionnaire below.');
        return;
      }

      showStatus('ok', '✅ Found ' + extractedTxns.length + ' transactions', 'Review below and click Calculate Score');
      showTransactionPreview(extractedTxns);
      document.getElementById('calc-section').style.display = 'block';

    } catch (err) {
      console.error('PDF error:', err);
      showStatus('error', '❌ Could not read this PDF', 'Try the manual questionnaire below.');
    }
  };

  function showStatus(type, msg, sub = '') {
    const el = document.getElementById('ocr-status');
    const colors = { loading: '#1d5fa8', ok: '#0f7e5a', error: '#c0392b', warn: '#b45309' };
    const bgs    = { loading: '#e8f0fb', ok: '#e8f5ef', error: '#fdecea', warn: '#fff8e6' };
    const c = colors[type] || colors.loading;
    const bg = bgs[type] || bgs.loading;
    el.style.display = 'block';
    el.innerHTML = `
    <div style="background:${bg};border:1px solid ${c}30;border-radius:12px;padding:14px 16px;display:flex;align-items:flex-start;gap:10px;">
      ${type === 'loading' ? `<div style="width:16px;height:16px;border:2px solid ${c};border-top-color:transparent;border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;margin-top:2px;"></div>` : ''}
      <div>
        <div style="font-size:13px;font-weight:600;color:${c};">${msg}</div>
        ${sub ? `<div style="font-size:12px;color:${c};opacity:.7;margin-top:2px;">${sub}</div>` : ''}
      </div>
    </div>`;
  }

  function parseUPITransactions(text) {
    const txns = [];
    const datePatterns = [
      /(\d{1,2}[\/\-\.]\d{1,2}[\/\-\.]\d{2,4})/,
      /(\d{4}[\/\-]\d{1,2}[\/\-]\d{1,2})/,
    ];
    const creditWords = /credit|received|refund|cashback|salary|income|deposit|transfer in|incoming|topup|add money|cr\b/i;
    const debitWords = /debit|paid|payment|sent|purchase|transfer out|outgoing|withdrawal|dr\b/i;

    const lines = text.split(/\n|\r/).map(l => l.trim()).filter(Boolean);

    for (let i = 0; i < lines.length; i++) {
      const line = lines[i];
      if (line.length < 5) continue;

      let dateMatch = null, dateStr = '';
      for (const pattern of datePatterns) {
        const match = line.match(pattern);
        if (match) { dateMatch = match; dateStr = match[0]; break; }
      }
      if (!dateMatch) continue;

      const amounts = [...line.matchAll(/[₹Rs]?\s*([\d,]+(?:\.\d{1,2})?)/g)];
      if (amounts.length === 0) continue;

      const rawAmt = parseFloat(amounts[amounts.length - 1][1].replace(/,/g, ''));
      if (isNaN(rawAmt) || rawAmt < 1 || rawAmt > 10000000) continue;

      const isCredit = creditWords.test(line) && !debitWords.test(line);
      const merchant = line.replace(dateStr, '').replace(/[₹Rs]?[\d,]+(?:\.\d{1,2})?/g, '').substring(0, 40).trim() || 'UPI Transaction';

      txns.push({ date: dateStr, merchant, amt: isCredit ? rawAmt : -rawAmt, credit: isCredit });
    }

    return txns.slice(0, 200);
  }

  function showTransactionPreview(txns) {
    const income = txns.filter(t=>t.credit).reduce((a,t)=>a+t.amt,0);
    const spend  = txns.filter(t=>!t.credit).reduce((a,t)=>a+Math.abs(t.amt),0);
    
    const el = document.getElementById('txn-preview');
    el.style.display = 'block';
    el.innerHTML = `
    <div class="cdna-card" style="padding:16px 20px;background:#faf8f3;">
      <div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px;">
        <div style="font-size:13px;font-weight:700;color:#1a1208;">${txns.length} transactions detected</div>
        <div style="display:flex;gap:16px;">
          <span style="font-size:12px;color:#0f7e5a;font-weight:600;">+₹${income.toLocaleString('en-IN')}</span>
          <span style="font-size:12px;color:#c0392b;font-weight:600;">−₹${spend.toLocaleString('en-IN')}</span>
        </div>
      </div>
    </div>`;
  }

  window._runScoring = () => {
    if (!extractedTxns || extractedTxns.length === 0) {
      toast('No transactions found. Please upload a valid PDF.', 'err');
      return;
    }

    const score = calculateScore(extractedTxns);
    const updatedUser = DB.updateUser({ id: u.id, score, transactions: extractedTxns });
    
    if (updatedUser) {
      toast(`🎉 Your score is ${score}!`, 'ok');
      setTimeout(() => go('dashboard'), 1500);
    }
  };

  function calculateScore(txns) {
    let score = 300;

    // Frequency signal
    score += Math.min(txns.length * 10, 150);

    // Income stability
    const income = txns.filter(t => t.credit).length;
    score += Math.min(income * 8, 100);

    // Merchant diversity
    const merchants = new Set(txns.map(t => t.merchant)).size;
    score += Math.min(merchants * 15, 100);

    // Payment consistency
    const payments = txns.filter(t => !t.credit).length;
    score += Math.min(payments * 5, 80);

    // Volume signal
    const totalVolume = txns.reduce((a, t) => a + Math.abs(t.amt), 0);
    score += Math.min(totalVolume / 100000, 70);

    return Math.min(Math.max(Math.round(score), 300), 900);
  }

  window._showManualQuestionnaire = () => {
    document.getElementById('drop-zone').style.display = 'none';
    document.getElementById('manual-section').style.display = 'block';
    document.getElementById('manual-section').innerHTML = `
    <div class="cdna-card" style="padding:24px;">
      <h3 class="font-display font-bold text-ink mb-4" style="font-size:18px;">📋 Manual Questionnaire</h3>
      <div class="field"><label>Monthly UPI Transactions *</label>
        <input id="m-txn-count" type="number" placeholder="e.g., 50" min="1" max="1000">
      </div>
      <div class="field"><label>Average Monthly Income (₹) *</label>
        <input id="m-income" type="number" placeholder="e.g., 50000" min="0">
      </div>
      <div class="field"><label>Number of Different Merchants/Categories</label>
        <input id="m-merchants" type="number" placeholder="e.g., 10" min="1" max="100">
      </div>
      <div class="field"><label>Monthly Spending (₹) *</label>
        <input id="m-spend" type="number" placeholder="e.g., 30000" min="0">
      </div>
      <div class="field"><label>Months Using UPI *</label>
        <input id="m-months" type="number" placeholder="e.g., 24" min="1" max="120">
      </div>
      <button class="btn-primary btn-full btn-lg" style="border-radius:12px;" onclick="window._submitManualScore()">
        Calculate My Score →
      </button>
    </div>`;

    window._submitManualScore = () => {
      const txnCount = parseInt(document.getElementById('m-txn-count').value) || 0;
      const income = parseFloat(document.getElementById('m-income').value) || 0;
      const merchants = parseInt(document.getElementById('m-merchants').value) || 0;
      const spend = parseFloat(document.getElementById('m-spend').value) || 0;
      const months = parseInt(document.getElementById('m-months').value) || 0;

      if (!txnCount || !income || !merchants || !spend || !months) {
        toast('Please fill in all fields', 'err');
        return;
      }

      let score = 300;
      score += Math.min(txnCount * 8, 150);
      score += (income > 20000 ? 100 : Math.min(income / 200, 100));
      score += Math.min(merchants * 12, 100);
      score += (spend > 10000 ? 80 : Math.min(spend / 125, 80));
      score += Math.min(months * 3, 70);

      score = Math.min(Math.max(Math.round(score), 300), 900);

      const updatedUser = DB.updateUser({ id: u.id, score, transactions: [] });
      if (updatedUser) {
        toast(`🎉 Your score is ${score}!`, 'ok');
        setTimeout(() => go('dashboard'), 1500);
      }
    };
  };
}
