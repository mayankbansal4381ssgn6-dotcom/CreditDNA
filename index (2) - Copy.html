<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CreditDNA — Alternative Credit Scoring for Unbanked India</title>
<meta name="description" content="CreditDNA builds a 300-900 credit score from UPI transaction behaviour using AMD Ryzen AI on-device processing. Privacy-first alternative credit scoring for 500M unbanked Indians.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ── RESET & BASE ─────────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:#010a04}
::-webkit-scrollbar-thumb{background:#00ff41;border-radius:3px}
body{background:#010a04;color:#c8f0d4;font-family:'Rajdhani',sans-serif;overflow-x:hidden;line-height:1.6}

/* ── KEYFRAMES ────────────────────────────────────────── */
@keyframes glow{0%,100%{text-shadow:0 0 12px #00ff41,0 0 24px #00ff41}50%{text-shadow:0 0 32px #00ff41,0 0 64px #00ff41,0 0 96px #00ff41}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulse{0%,100%{box-shadow:0 0 8px rgba(0,255,65,.25)}50%{box-shadow:0 0 22px rgba(0,255,65,.55)}}
@keyframes scanline{0%{top:-2px}100%{top:100%}}
@keyframes scoreRise{from{opacity:0;transform:scale(.4)}to{opacity:1;transform:scale(1)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes slideIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes countUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

/* ── UTILITY ──────────────────────────────────────────── */
.page{animation:fadeIn .35s ease}
.btn{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;border:1.5px solid #00ff41;background:transparent;color:#00ff41;padding:11px 26px;cursor:pointer;position:relative;overflow:hidden;transition:all .3s;clip-path:polygon(7px 0%,100% 0%,calc(100% - 7px) 100%,0% 100%)}
.btn:hover{background:#00ff41;color:#010a04;box-shadow:0 0 28px rgba(0,255,65,.65)}
.btn.solid{background:#00ff41;color:#010a04}
.btn.solid:hover{background:#00cc33;box-shadow:0 0 36px rgba(0,255,65,.8)}
.btn.sm{font-size:9px;padding:8px 18px}
.card{background:rgba(0,18,7,.92);border:1px solid rgba(0,255,65,.2);border-radius:3px;transition:border-color .3s,box-shadow .3s}
.card:hover{border-color:rgba(0,255,65,.42);box-shadow:0 0 18px rgba(0,255,65,.07)}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px}
.grid3{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.grid4{display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:16px}
.section{padding:72px 28px;max-width:1120px;margin:0 auto}
.section-label{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:4px;color:#00ff41;margin-bottom:10px}
.section-title{font-family:'Orbitron',sans-serif;font-size:clamp(22px,4vw,36px);font-weight:900;color:#c8f0d4}
.divider{border:none;border-top:1px solid rgba(0,255,65,.08);margin:0}
input,select,textarea{background:rgba(0,20,8,.85);border:1px solid rgba(0,255,65,.2);color:#c8f0d4;padding:11px 15px;font-family:'Rajdhani',sans-serif;font-size:15px;outline:none;width:100%;border-radius:2px;transition:all .3s}
input:focus,select:focus,textarea:focus{border-color:#00ff41;box-shadow:0 0 14px rgba(0,255,65,.2)}
input::placeholder,textarea::placeholder{color:#3a6a48}
select option{background:#010a04}
label.lbl{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;color:#00ff41;display:block;margin-bottom:5px}
.field{margin-bottom:18px}
.err{background:rgba(255,68,68,.08);border:1px solid rgba(255,68,68,.3);border-radius:3px;padding:11px 15px;margin-bottom:16px;color:#ff7777;font-size:14px}
.nav-btn{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:rgba(200,240,212,.6);cursor:pointer;transition:all .3s;padding:4px 0;border:none;border-bottom:1px solid transparent;background:none;text-transform:uppercase}
.nav-btn:hover,.nav-btn.active{color:#00ff41;border-bottom-color:#00ff41}
#toast{position:fixed;bottom:22px;right:22px;z-index:9999;padding:13px 20px;font-size:14px;font-family:'Rajdhani',sans-serif;display:none;background:rgba(0,18,7,.98);border:1px solid #00ff41;border-left:4px solid #00ff41;color:#c8f0d4;box-shadow:0 0 22px rgba(0,255,65,.3);border-radius:2px;max-width:300px;animation:fadeInUp .3s ease}

/* ── NAV ──────────────────────────────────────────────── */
#nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(1,10,4,.96);border-bottom:1px solid rgba(0,255,65,.12);backdrop-filter:blur(14px);height:62px;display:flex;align-items:center;justify-content:space-between;padding:0 28px}
.nav-logo{cursor:pointer;display:flex;align-items:center;gap:11px}
.nav-logo svg{flex-shrink:0}
.nav-logo-text{line-height:1}
.nav-logo-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:900;color:#00ff41;letter-spacing:3px;text-shadow:0 0 12px rgba(0,255,65,.45)}
.nav-logo-sub{font-family:'Orbitron',sans-serif;font-size:7px;color:rgba(0,255,65,.38);letter-spacing:2.5px;margin-top:3px}
#nav-links{display:flex;align-items:center;gap:26px}

/* ── HERO ─────────────────────────────────────────────── */
#hero{min-height:100vh;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:100px 28px 60px;overflow:hidden}
#three-canvas{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,255,65,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,65,.02) 1px,transparent 1px);background-size:55px 55px;pointer-events:none}
.scanline{position:absolute;left:0;right:0;height:1px;background:rgba(0,255,65,.07);animation:scanline 7s linear infinite;pointer-events:none}
.corner{position:absolute;width:36px;height:36px;pointer-events:none}
.corner.tl{top:82px;left:16px;border-top:2px solid rgba(0,255,65,.3);border-left:2px solid rgba(0,255,65,.3)}
.corner.tr{top:82px;right:16px;border-top:2px solid rgba(0,255,65,.3);border-right:2px solid rgba(0,255,65,.3)}
.corner.bl{bottom:16px;left:16px;border-bottom:2px solid rgba(0,255,65,.3);border-left:2px solid rgba(0,255,65,.3)}
.corner.br{bottom:16px;right:16px;border-bottom:2px solid rgba(0,255,65,.3);border-right:2px solid rgba(0,255,65,.3)}
.hero-inner{position:relative;z-index:1;text-align:center;max-width:950px}
.hero-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,255,65,.07);border:1px solid rgba(0,255,65,.25);border-radius:100px;padding:5px 18px;margin-bottom:22px;animation:fadeInUp .5s ease}
.hero-badge-dot{width:5px;height:5px;border-radius:50%;background:#00ff41;box-shadow:0 0 8px #00ff41;animation:blink 2s infinite}
.hero-badge span{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:3px;color:#00ff41}
.hero-title-credit{font-family:'Orbitron',sans-serif;font-size:clamp(52px,10vw,110px);font-weight:900;line-height:.92;color:#00ff41;animation:glow 3.5s ease infinite}
.hero-title-dna{font-family:'Orbitron',sans-serif;font-size:clamp(52px,10vw,110px);font-weight:900;line-height:.92;color:#fff;text-shadow:0 0 30px rgba(255,255,255,.15)}
.hero-score-pill{display:inline-flex;align-items:center;gap:16px;background:rgba(0,18,7,.88);border:1px solid rgba(0,255,65,.28);border-radius:100px;padding:9px 26px;margin:24px auto 0;animation:fadeInUp .6s ease .2s both}
.hero-score-num{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:900;color:#00ff41;animation:scoreRise .8s ease .5s both}
.hero-score-label{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;color:rgba(0,255,65,.45)}
.hero-score-tier{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#00ff41}
.hero-divider{width:1px;height:34px;background:rgba(0,255,65,.2)}
.hero-score-desc{font-size:11px;color:rgba(200,240,212,.5);text-align:left;line-height:1.6}
.hero-sub{font-size:17px;color:rgba(200,240,212,.58);max-width:580px;margin:20px auto 40px;line-height:1.85;animation:fadeInUp .6s ease .3s both}
.hero-ctas{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;animation:fadeInUp .6s ease .4s both;margin-bottom:52px}

/* ── STATS BAR ────────────────────────────────────────── */
.stats-bar{background:rgba(0,255,65,.04);border-top:1px solid rgba(0,255,65,.1);border-bottom:1px solid rgba(0,255,65,.1);padding:22px 28px;display:flex;justify-content:center;gap:clamp(20px,5vw,72px);flex-wrap:wrap}
.stat-item{text-align:center}
.stat-val{font-family:'Orbitron',sans-serif;font-size:clamp(20px,3vw,26px);font-weight:900;color:#00ff41}
.stat-lbl{font-size:11px;color:rgba(200,240,212,.38);letter-spacing:1px;margin-top:3px}

/* ── PROBLEM SECTION ──────────────────────────────────── */
.problem-bg{background:rgba(0,8,3,.7);border-top:1px solid rgba(0,255,65,.07);border-bottom:1px solid rgba(0,255,65,.07)}
.problem-grid{display:grid;grid-template-columns:1fr 1fr;gap:36px;align-items:center}
@media(max-width:700px){.problem-grid{grid-template-columns:1fr}}
.problem-headline{font-family:'Orbitron',sans-serif;font-size:clamp(18px,3vw,28px);font-weight:900;color:#c8f0d4;line-height:1.3;margin-bottom:20px}
.problem-headline span{color:#ff5555}
.problem-stat{display:flex;align-items:flex-start;gap:14px;margin-bottom:18px}
.problem-stat-num{font-family:'Orbitron',sans-serif;font-size:32px;font-weight:900;color:#ff5555;line-height:1;flex-shrink:0}
.problem-stat-text{font-size:14px;color:rgba(200,240,212,.6);line-height:1.65}
.problem-box{padding:22px;background:rgba(0,18,7,.9);border:1px solid rgba(255,85,85,.2);border-radius:3px;margin-bottom:14px}
.problem-box-title{font-family:'Orbitron',sans-serif;font-size:10px;letter-spacing:2px;color:#ff7777;margin-bottom:8px}
.problem-box-text{font-size:13px;color:rgba(200,240,212,.55);line-height:1.7}

/* ── HOW IT WORKS ─────────────────────────────────────── */
.step-card{padding:28px;position:relative;overflow:hidden}
.step-num{font-family:'Orbitron',sans-serif;font-size:48px;font-weight:900;color:rgba(0,255,65,.06);position:absolute;top:12px;right:18px;line-height:1}
.step-icon{font-size:28px;margin-bottom:14px}
.step-label{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;margin-bottom:5px}
.step-title{font-family:'Orbitron',sans-serif;font-size:14px;font-weight:700;color:#c8f0d4;margin-bottom:10px}
.step-desc{font-size:13px;color:rgba(200,240,212,.52);line-height:1.7}
.step-connector{display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:18px;color:rgba(0,255,65,.3);padding:0 4px;padding-top:40px}
.steps-row{display:grid;grid-template-columns:1fr auto 1fr auto 1fr auto 1fr;gap:0;align-items:start}
@media(max-width:900px){.steps-row{grid-template-columns:1fr 1fr}.step-connector{display:none}}
@media(max-width:500px){.steps-row{grid-template-columns:1fr}.step-connector{display:none}}

/* ── UNIQUE ANGLE ─────────────────────────────────────── */
.angle-bg{background:rgba(0,8,3,.7);border-top:1px solid rgba(0,255,65,.07);border-bottom:1px solid rgba(0,255,65,.07)}
.vs-table{width:100%;border-collapse:separate;border-spacing:0}
.vs-table th{font-family:'Orbitron',sans-serif;font-size:9px;letter-spacing:2px;padding:12px 18px;border-bottom:1px solid rgba(0,255,65,.12)}
.vs-table td{font-size:13px;padding:12px 18px;border-bottom:1px solid rgba(0,255,65,.05);vertical-align:middle}
.vs-table tr:last-child td{border-bottom:none}
.vs-table .bad{color:#ff7777}
.vs-table .good{color:#00ff41;font-weight:600}
.formula-box{background:rgba(0,18,7,.9);border:1px solid rgba(0,255,65,.2);border-radius:3px;padding:26px;font-family:'Rajdhani',monospace}
.formula-line{font-size:15px;color:rgba(200,240,212,.7);line-height:2.2}
.formula-plus{color:rgba(0,255,65,.4);margin:0 8px}
.formula-eq{color:#00ff41;font-weight:700;margin:0 8px}
.formula-result{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#00ff41;margin-top:10px;letter-spacing:1px}
.four-pillars{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.pillar{padding:14px 16px;background:rgba(0,255,65,.05);border:1px solid rgba(0,255,65,.15);border-radius:2px;display:flex;align-items:center;gap:10px;font-family:'Orbitron',sans-serif;font-size:10px;color:#00ff41;letter-spacing:1px}

/* ── TECH ─────────────────────────────────────────────── */
.tech-card{padding:22px}
.tech-layer{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;margin-bottom:8px}
.tech-name{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#c8f0d4;margin-bottom:6px}
.tech-chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.chip{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:1px;padding:4px 10px;border:1px solid rgba(0,255,65,.2);border-radius:100px;color:rgba(200,240,212,.6)}

/* ── REVENUE ──────────────────────────────────────────── */
.rev-card{padding:24px;text-align:center}
.rev-icon{font-size:30px;margin-bottom:12px}
.rev-title{font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:1.5px;margin-bottom:8px}
.rev-val{font-family:'Orbitron',sans-serif;font-size:22px;font-weight:900;color:#00ff41;margin-bottom:6px}
.rev-desc{font-size:12px;color:rgba(200,240,212,.45);line-height:1.6}

/* ── RAVI DEMO ────────────────────────────────────────── */
.demo-bg{background:rgba(0,8,3,.7);border-top:1px solid rgba(0,255,65,.07);border-bottom:1px solid rgba(0,255,65,.07)}
.demo-step{display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-bottom:1px solid rgba(0,255,65,.05)}
.demo-step:last-child{border-bottom:none}
.demo-step-dot{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;flex-shrink:0;margin-top:2px}
.demo-step-title{font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;color:#c8f0d4;margin-bottom:3px}
.demo-step-text{font-size:13px;color:rgba(200,240,212,.5);line-height:1.6}

/* ── TEAM ─────────────────────────────────────────────── */
.team-card{padding:26px;text-align:center}
.team-avatar{width:64px;height:64px;border-radius:3px;display:flex;align-items:center;justify-content:center;margin:0 auto 14px;font-size:22px}
.team-name{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;margin-bottom:5px}
.team-role{font-size:12px;color:rgba(200,240,212,.4)}

/* ── TIMELINE ─────────────────────────────────────────── */
.timeline-item{display:flex;gap:18px;margin-bottom:20px}
.timeline-time{flex-shrink:0;width:150px;font-family:'Orbitron',sans-serif;font-size:9px;color:#00ff41;letter-spacing:1px;line-height:1.7;text-align:right;padding-top:2px}
.timeline-dot-col{flex-shrink:0;display:flex;flex-direction:column;align-items:center}
.timeline-dot{width:11px;height:11px;border-radius:50%;background:#00ff41;box-shadow:0 0 10px #00ff41}
.timeline-line{width:1px;flex:1;background:rgba(0,255,65,.18);margin-top:3px;min-height:36px}
.timeline-content-title{font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;color:#c8f0d4;margin-bottom:3px}
.timeline-content-text{font-size:12px;color:rgba(200,240,212,.4)}

/* ── AUTH FORMS ───────────────────────────────────────── */
.auth-wrap{min-height:calc(100vh - 62px);display:flex;align-items:center;justify-content:center;padding:60px 20px;background:radial-gradient(ellipse at 50% 40%,rgba(0,255,65,.04) 0%,transparent 65%)}
.auth-box{width:100%;max-width:440px;animation:fadeInUp .4s ease}
.auth-header{text-align:center;margin-bottom:30px}
.auth-header .section-label{display:block;margin-bottom:8px}
.auth-header h1{font-family:'Orbitron',sans-serif;font-size:26px;font-weight:900;color:#c8f0d4}
.auth-header p{color:rgba(200,240,212,.4);margin-top:7px;font-size:13px}
.auth-card{padding:34px;animation:pulse 3s infinite}
.step-circles{display:flex;align-items:center;justify-content:center;gap:0;margin-bottom:8px}
.step-circle{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;transition:all .3s}
.step-bar{width:55px;height:2px}

/* ── DASHBOARD ────────────────────────────────────────── */
.db-wrap{padding:26px 28px 60px;max-width:1100px;margin:0 auto}
.db-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:30px;flex-wrap:wrap;gap:14px}
.db-title{font-family:'Orbitron',sans-serif;font-size:clamp(20px,4vw,30px);font-weight:900;color:#c8f0d4}
.db-sub{color:rgba(200,240,212,.4);font-size:13px;margin-top:5px}
.stat-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:14px;margin-bottom:22px}
.stat-card{padding:18px}
.stat-card .sc-icon{font-size:20px;margin-bottom:6px}
.stat-card .sc-lbl{font-family:'Orbitron',sans-serif;font-size:8px;letter-spacing:2px;margin-bottom:3px}
.stat-card .sc-val{font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;color:#c8f0d4}
.db-grid{display:grid;grid-template-columns:2fr 1fr;gap:20px}
@media(max-width:700px){.db-grid{grid-template-columns:1fr}}
.announce-item{display:flex;gap:9px;padding:9px 0}
.announce-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;margin-top:6px}
.announce-title{font-size:12px;color:#c8f0d4;line-height:1.45}
.announce-time{font-size:10px;color:rgba(200,240,212,.28);margin-top:2px}

/* ── SUBMIT ───────────────────────────────────────────── */
.sub-wrap{padding:26px 20px 60px;max-width:700px;margin:0 auto}
.sub-progress-bar{display:flex;gap:3px;margin-bottom:6px}
.sub-progress-seg{flex:1;height:3px;border-radius:2px;cursor:pointer;transition:all .3s}

/* ── PROFILE ──────────────────────────────────────────── */
.profile-wrap{padding:26px 28px 60px;max-width:700px;margin:0 auto}

/* ── FOOTER ───────────────────────────────────────────── */
footer{border-top:1px solid rgba(0,255,65,.06);padding:24px;text-align:center}
footer .f-brand{font-family:'Orbitron',sans-serif;font-size:10px;color:rgba(0,255,65,.2);letter-spacing:2px}
footer .f-sub{font-size:11px;color:rgba(200,240,212,.15);margin-top:5px}
</style>
</head>

<!-- ── APP ──────────────────────────────────────────────────── -->
<div id="app" style="padding-top:62px;min-height:100vh"></div>

<!-- ── THREE.JS ──────────────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

/* ════════════════════════════════════════════════════════
   TOAST
═══════════════════════════════════════════════════════ */
let _tt;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  const colors = { success: '#00ff41', error: '#ff4444', warning: '#ffcc00', info: '#44bbff' };
  const c = colors[type] || colors.success;
  el.style.borderLeftColor = c; el.style.borderColor = c; el.style.boxShadow = `0 0 20px ${c}40`;
  el.textContent = msg; el.style.display = 'block';
  clearTimeout(_tt); _tt = setTimeout(() => el.style.display = 'none', 3400);
}

/* ════════════════════════════════════════════════════════
   COUNTDOWN
═══════════════════════════════════════════════════════ */
function startCountdown(id) {
  clearInterval(CD_INTERVAL);
  const target = new Date('2025-04-20T09:00:00');
  const tick = () => {
    const el = document.getElementById(id); if (!el) { clearInterval(CD_INTERVAL); return; }
    const d = target - Date.now();
    const pad = n => String(Math.floor(n)).padStart(2, '0');
    if (d <= 0) { el.innerHTML = `<span style="color:#00ff41;font-family:Orbitron,sans-serif;font-size:14px;letter-spacing:2px">EVENT LIVE NOW!</span>`; return; }
    const D = pad(d / 86400000), H = pad((d % 86400000) / 3600000), M = pad((d % 3600000) / 60000), S = pad((d % 60000) / 1000);
    el.innerHTML = `<div style="display:flex;gap:16px;justify-content:center">${[['DAYS', D], ['HRS', H], ['MIN', M], ['SEC', S]].map(([l, v]) => `<div style="text-align:center"><div style="font-family:Orbitron,sans-serif;font-size:clamp(20px,3.5vw,34px);font-weight:900;color:#00ff41;text-shadow:0 0 12px rgba(0,255,65,.45)">${v}</div><div style="font-family:Orbitron,sans-serif;font-size:8px;color:rgba(0,255,65,.35);letter-spacing:2px;margin-top:3px">${l}</div></div>`).join('')}</div>`;
  };
  tick(); CD_INTERVAL = setInterval(tick, 1000);
}

/* ════════════════════════════════════════════════════════
   THREE.JS — DNA HELIX
═══════════════════════════════════════════════════════ */
function initThree(canvasId) {
  if (THREE_CLEANUP) { THREE_CLEANUP(); THREE_CLEANUP = null; }
  const canvas = document.getElementById(canvasId); if (!canvas) return;
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setClearColor(0x000000, 0);
  const scene = new THREE.Scene();
  const camera = new THREE.PerspectiveCamera(70, 1, .1, 1000);
  camera.position.z = 7;
  const resize = () => {
    const w = canvas.parentElement.clientWidth, h = canvas.parentElement.clientHeight;
    renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
  };
  resize(); window.addEventListener('resize', resize);

  // DNA Double Helix
  const helixGroup = new THREE.Group();
  const N = 80;
  const strand1 = [], strand2 = [];
  for (let i = 0; i < N; i++) {
    const t = i / N * Math.PI * 8, r = 2;
    strand1.push(new THREE.Vector3(Math.cos(t) * r, i / N * 14 - 7, Math.sin(t) * r));
    strand2.push(new THREE.Vector3(Math.cos(t + Math.PI) * r, i / N * 14 - 7, Math.sin(t + Math.PI) * r));
  }
  const mkLine = (pts, color, op) => {
    const geo = new THREE.BufferGeometry().setFromPoints(pts);
    return new THREE.Line(geo, new THREE.LineBasicMaterial({ color, transparent: true, opacity: op }));
  };
  helixGroup.add(mkLine(strand1, 0x00ff41, .6));
  helixGroup.add(mkLine(strand2, 0x44ffcc, .4));
  for (let i = 0; i < N; i += 5) {
    helixGroup.add(mkLine([strand1[i], strand2[i]], 0x00ff41, .18));
    const sg = new THREE.SphereGeometry(.09, 6, 6);
    const sm = new THREE.MeshBasicMaterial({ color: 0x00ff41, transparent: true, opacity: .8 });
    const s1 = new THREE.Mesh(sg, sm); s1.position.copy(strand1[i]); helixGroup.add(s1);
    const s2 = new THREE.Mesh(sg.clone(), sm.clone()); s2.position.copy(strand2[i]); helixGroup.add(s2);
  }
  scene.add(helixGroup);

  // Icosahedron
  const ico = new THREE.Mesh(
    new THREE.IcosahedronGeometry(3.6, 0),
    new THREE.MeshBasicMaterial({ color: 0x00ff41, wireframe: true, transparent: true, opacity: .06 })
  );
  scene.add(ico);

  // Particles
  const pPos = new Float32Array(380 * 3);
  for (let i = 0; i < 380; i++) { pPos[i * 3] = (Math.random() - .5) * 24; pPos[i * 3 + 1] = (Math.random() - .5) * 24; pPos[i * 3 + 2] = (Math.random() - .5) * 10; }
  const pGeo = new THREE.BufferGeometry(); pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
  scene.add(new THREE.Points(pGeo, new THREE.PointsMaterial({ color: 0x00ff41, size: .05, transparent: true, opacity: .45 })));

  let mx = 0, my = 0;
  const onMouse = e => { mx = (e.clientX / window.innerWidth - .5) * 2; my = -(e.clientY / window.innerHeight - .5) * 2; };
  window.addEventListener('mousemove', onMouse);

  let t = 0, rafId;
  const animate = () => {
    rafId = requestAnimationFrame(animate); t += .003;
    helixGroup.rotation.y = t * .3 + mx * .05;
    helixGroup.rotation.x = my * .04;
    ico.rotation.x = t * .07; ico.rotation.y = -t * .09;
    renderer.render(scene, camera);
  };
  animate();
  THREE_CLEANUP = () => {
    cancelAnimationFrame(rafId);
    window.removeEventListener('mousemove', onMouse);
    window.removeEventListener('resize', resize);
    renderer.dispose();
  };
}

/* ════════════════════════════════════════════════════════
   AUTH
═══════════════════════════════════════════════════════ */
function doLogin(email, pass) {
  const u = DB.users().find(u => u.email === email && u.password === pass);
  if (u) { DB.saveUser(u); USER = u; toast(`Welcome back, ${u.name}! 🧬`); goPage('dashboard'); return true; }
  return false;
}
function doRegister(data) {
  const users = DB.users();
  if (users.find(u => u.email === data.email)) { toast('Email already registered', 'error'); return false; }
  const u = { ...data, id: Date.now(), joined: new Date().toISOString() };
  users.push(u); DB.saveUsers(users); DB.saveUser(u); USER = u;
  toast('Registered! Welcome to HackNova 3.0 🧬'); goPage('dashboard'); return true;
}
function doLogout() { DB.clearUser(); USER = null; toast('See you at the hackathon! 👋', 'info'); goPage('landing'); }

function renderRegister() {
  document.getElementById('app').innerHTML = `<div class="page auth-wrap"><div style="width:100%;max-width:470px" id="reg-wrap"></div></div>`;

function renderRegStep() {
  const steps = ['Personal Info', 'Team Details', 'Track & Skills'];
  const w = document.getElementById('reg-wrap'); if (!w) return;
  const circles = steps.map((s, i) => `
    <div style="display:flex;align-items:center">
      <div class="step-circle" style="background:${i + 1 <= regStep ? '#00ff41' : 'rgba(0,255,65,.1)'};border:2px solid ${i + 1 <= regStep ? '#00ff41' : 'rgba(0,255,65,.22)'};color:${i + 1 <= regStep ? '#010a04' : 'rgba(0,255,65,.35)'};box-shadow:${i + 1 === regStep ? '0 0 14px rgba(0,255,65,.5)' : 'none'}">${i + 1}</div>
      ${i < 2 ? `<div class="step-bar" style="background:${i + 1 < regStep ? '#00ff41' : 'rgba(0,255,65,.15)'}"></div>` : ''}
    </div>`).join('');
  let fh = '';
  if (regStep === 1) fh = `
    <div class="field"><label class="lbl">Full Name *</label><input id="r-name" value="${regData.name || ''}" placeholder="e.g. Simon Paul"></div>
    <div class="field"><label class="lbl">Email *</label><input id="r-email" type="email" value="${regData.email || ''}" placeholder="you@srmist.edu.in"></div>

    <div class="field" style="margin-bottom:0"><label class="lbl">Confirm Password *</label><input id="r-conf" type="password" value="${regData.confirm || ''}" placeholder="Repeat password"></div>`;
  else if (regStep === 2) fh = `
    <div class="field"><label class="lbl">Team Name *</label><input id="r-team" value="${regData.teamName || ''}" placeholder="e.g. BOTSQUAD"></div>
    <div class="field"><label class="lbl">College / Organization *</label><input id="r-college" value="${regData.college || ''}" placeholder="e.g. SRM IST Chennai"></div>
    <div class="field"><label class="lbl">Phone (Optional)</label><input id="r-phone" type="tel" value="${regData.phone || ''}" placeholder="+91 00000 00000"></div>

    <div style="background:rgba(0,255,65,.04);border:1px solid rgba(0,255,65,.12);border-radius:3px;padding:12px;font-size:12px;color:rgba(200,240,212,.42);line-height:1.7">✓ By registering you agree to the MLH Code of Conduct and HackNova 3.0 rules.</div>`;

  w.innerHTML = `
  <div style="animation:fadeInUp .35s ease">
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-family:Orbitron,sans-serif;font-size:10px;letter-spacing:4px;color:#00ff41;margin-bottom:8px">CREATE ACCOUNT</div>
      <h1 style="font-family:Orbitron,sans-serif;font-size:26px;font-weight:900;color:#c8f0d4">Join HackNova 3.0</h1>
    </div>
    <div class="step-circles">${circles}</div>
    <div style="font-family:Orbitron,sans-serif;font-size:9px;letter-spacing:2px;color:rgba(0,255,65,.42);text-align:center;margin:8px 0 20px">STEP ${regStep}/3 — ${steps[regStep - 1].toUpperCase()}</div>
    <div class="card auth-card">
      <div id="reg-err"></div>
      ${fh}
      <div style="display:flex;gap:10px;margin-top:22px">
        ${regStep > 1 ? `<button class="btn" style="flex:1;padding:12px" onclick="regBack()">← Back</button>` : ''}
        <button class="btn solid" style="flex:2;padding:12px" onclick="regNext()">${regStep < 3 ? 'Next →' : 'Complete Registration →'}</button>
      </div>
    </div>
    <div style="text-align:center;margin-top:16px;font-size:13px;color:rgba(200,240,212,.38)">
      Already registered? <span style="color:#00ff41;cursor:pointer" onclick="goPage('login')">Login here</span>
    </div>
  </div>`;
}
function regBack() { regStep--; renderRegStep(); }
function regNext() {
  const e = document.getElementById('reg-err');
  if (regStep === 1) {
    const n = document.getElementById('r-name').value.trim(), em = document.getElementById('r-email').value.trim(), p = document.getElementById('r-pass').value, c = document.getElementById('r-conf').value;
    if (!n || !em || !p || !c) { e.innerHTML = `<div class="err">All fields required</div>`; return; }
    if (p.length < 6) { e.innerHTML = `<div class="err">Password min 6 characters</div>`; return; }
    if (p !== c) { e.innerHTML = `<div class="err">Passwords don't match</div>`; return; }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) { e.innerHTML = `<div class="err">Invalid email</div>`; return; }
    Object.assign(regData, { name: n, email: em, password: p, confirm: c }); regStep++; renderRegStep();
  } else if (regStep === 2) {
    const t = document.getElementById('r-team').value.trim(), co = document.getElementById('r-college').value.trim();
    if (!t || !co) { e.innerHTML = `<div class="err">Team name and college required</div>`; return; }
    Object.assign(regData, { teamName: t, college: co, phone: document.getElementById('r-phone').value.trim(), teamSize: document.getElementById('r-size').value });
    regStep++; renderRegStep();
  } else {
    const tr = document.getElementById('r-track').value;
    if (!tr) { e.innerHTML = `<div class="err">Please select a track</div>`; return; }
    Object.assign(regData, { track: tr, experience: document.getElementById('r-exp').value });
    doRegister(regData);
  }
}

  else if (subStep === 7) fh = f('innovation', 'What Makes This Unique? *', 'vs CIBIL, CreditVidya — on-device AMD NPU, UPI as credit proxy...', 3) + f('impact', 'Long-term Impact', '500M Indians, SE Asia expansion, ₹4B market...', 3);
  else fh = f('repoLink', 'GitHub Repository', 'https://github.com/SimonPaul-0/creditdna', 0, 'url') + f('demoLink', 'Demo / Live URL', 'https://creditdna.vercel.app', 0, 'url') + `

function subCollect() {
  const fields = { 0: ['projectTitle', 'teamName', 'track'], 1: ['problem', 'whyImportant', 'dataPoint'], 2: ['ideaTitle', 'valueProp', 'corePillars'], 3: ['primaryUsers', 'useCase', 'outcome'], 4: ['stack', 'technologies', 'algorithms', 'apis'], 5: ['architectureDesc'], 6: ['features', 'stretchGoals'], 7: ['innovation', 'impact'], 8: ['repoLink', 'demoLink'] };
  (fields[subStep] || []).forEach(id => { const el = document.getElementById('sf-' + id); if (el) subForm[id] = el.value; });
}
function subJump(i) { subCollect(); subStep = i; renderSubStep(); }
function subBack() { subCollect(); subStep--; renderSubStep(); }
function subNext() { subCollect(); if (subStep === 0 && !subForm.projectTitle) { toast('Project title required', 'error'); return; } subStep++; renderSubStep(); }
function subSubmit() {
  subCollect();
  if (!subForm.projectTitle) { toast('Project title required', 'error'); subStep = 0; renderSubStep(); return; }
  const subs = DB.subs().filter(s => s.userId !== USER.id);
  subs.push({ ...subForm, userId: USER.id, userName: USER.name, at: new Date().toISOString() });
  DB.saveSubs(subs); toast('CreditDNA submitted successfully! 🚀'); goPage('dashboard');
}
