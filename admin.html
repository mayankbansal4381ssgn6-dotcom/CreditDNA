<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CreditDNA Admin Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    theme: {
      extend: {
        colors: {
          dna: '#22c55e',
          'dna-dim': '#16a34a',
          'dna-glow': 'rgba(34,197,94,0.15)',
          adark: '#0a0f0a',
          asurf: '#0f1a0f',
          acard: '#141f14',
          aborder: 'rgba(34,197,94,0.15)',
          atext: '#e2f5e2',
          'atext-2': '#9dc49d',
          'atext-3': '#5a7a5a',
        },
        fontFamily: {
          display: ['"Bricolage Grotesque"', 'sans-serif'],
          body:    ['"Plus Jakarta Sans"',   'sans-serif'],
          mono:    ['"JetBrains Mono"',      'monospace'],
        },
      }
    }
  }
</script>
<link rel="stylesheet" href="css/styles.css">
<style>
  body { background: #0a0f0a; color: #e2f5e2; }
  .a-glass { background: rgba(15,26,15,0.95); backdrop-filter: blur(12px); }
  .a-card { background: #141f14; border: 1px solid rgba(34,197,94,0.15); border-radius: 16px; }
  .a-input { background: #0f1a0f; border: 1.5px solid rgba(34,197,94,0.2); color: #e2f5e2; border-radius: 10px; padding: 12px 14px; width: 100%; font-family: inherit; font-size: 15px; outline: none; transition: border-color .2s; }
  .a-input:focus { border-color: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,0.1); }
  .a-input::placeholder { color: #5a7a5a; }
  .a-btn { background: #22c55e; color: #0a0f0a; font-weight: 700; border-radius: 10px; padding: 13px 24px; border: none; cursor: pointer; font-family: inherit; font-size: 15px; transition: all .2s; width: 100%; }
  .a-btn:hover { background: #16a34a; transform: translateY(-1px); }
  .a-badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .a-stat { background: #141f14; border: 1px solid rgba(34,197,94,0.15); border-radius: 14px; padding: 20px; }
  .a-table { width: 100%; border-collapse: collapse; }
  .a-table th { text-align: left; font-size: 11px; font-weight: 700; letter-spacing: .1em; color: #5a7a5a; padding: 8px 14px; border-bottom: 1px solid rgba(34,197,94,0.1); }
  .a-table td { padding: 12px 14px; border-bottom: 1px solid rgba(34,197,94,0.07); font-size: 13px; color: #9dc49d; }
  .a-table tr:last-child td { border-bottom: none; }
  .a-table tr:hover td { background: rgba(34,197,94,0.05); }
  .glow-dot { width: 8px; height: 8px; background: #22c55e; border-radius: 50%; box-shadow: 0 0 8px #22c55e; animation: pulse-glow 2s ease-in-out infinite; }
  @keyframes pulse-glow { 0%,100%{opacity:1;box-shadow:0 0 8px #22c55e} 50%{opacity:.6;box-shadow:0 0 16px #22c55e} }
  .scan-line { position: absolute; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, #22c55e, transparent); animation: scan 3s linear infinite; opacity: .3; }
  @keyframes scan { from{top:0} to{top:100%} }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
  .fade-up { animation: fadeUp .4s ease forwards; }
</style>
</head>
<body class="min-h-screen font-body">

<div id="admin-app" class="min-h-screen"></div>

<div id="admin-toast" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none;"></div>

<script type="module" src="js/admin.js"></script>
</body>
</html>
